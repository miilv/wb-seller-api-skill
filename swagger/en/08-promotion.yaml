openapi: 3.0.1
info:
  title: Marketing and Promotions
  version: promotion
  description: |
    Campaign Management, bid settings, financial data accounting, and settings for with standard and custom bid and media campaigns.

    Data synchronization from the database occurs every 3 minutes. Status changes occur every 1 minute. The bid change occurs every 30 seconds. The latest changes are saved within the intervals
  x-file-name: promotion
security:
  - HeaderApiKey: []
tags:
  - name: Campaigns
    description: ''
  - name: Campaigns Creation
    description: ''
  - name: Campaigns Management
    description: ''
  - name: Search Clusters
    description: ''
  - name: Finances
    description: ''
  - name: Media
    description: ''
  - name: Statistics
    description: ''
  - name: Promotions Calendar
    description: ''
paths:
  /adv/v1/promotion/count:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Campaigns Lists
      description: |
        Method allows to get campaigns lists grouped by type and status with information about last campaign change date.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 5 requests | 200 ms | 5 requests |
        | Service | 1 s | 5 requests | 200 ms | 5 requests |
        | Base | 1 h | 4 requests | 15 min | 1 request |
        </div>
      tags:
        - Campaigns
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  adverts:
                    type: array
                    nullable: true
                    description: Campaign data
                    items:
                      type: object
                      properties:
                        type:
                          description: |
                            Campaign type:
                              - `8` — campaign with standard bid (**deprecated type**)
                              - `9` — campaign with standard or custom bid. You can get the bid type with the [Campaigns Information](./openapi/promotion#tag/Campaigns/paths/~1api~1advert~1v2~1adverts/get) method, `bid_type` field
                          type: integer
                        status:
                          description: Campaign status
                          type: integer
                        count:
                          description: Campaigns number
                          type: integer
                        advert_list:
                          description: Campaigns list
                          type: array
                          items:
                            type: object
                            properties:
                              advertId:
                                description: Campaign ID
                                type: integer
                              changeTime:
                                description: Date and time of the last campaign change
                                type: string
                                format: date-time
                  all:
                    description: Total number of campaigns with all statuses and types
                    type: integer
              example:
                adverts:
                  - type: 9
                    status: 8
                    count: 3
                    advert_list:
                      - advertId: 6485174
                        changeTime: '2023-05-10T12:12:52.676254+03:00'
                      - advertId: 6500443
                        changeTime: '2023-05-10T17:08:46.370656+03:00'
                      - advertId: 7936341
                        changeTime: '2023-07-12T15:51:08.367478+03:00'
                all: 3
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/advert/v2/adverts:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Campaigns Information
      description: |
        The method returns information about campaigns with standard or custom bid via statuses, payment types and IDs.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 5 requests | 200 ms | 5 requests |
        | Service | 1 s | 5 requests | 200 ms | 5 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      tags:
        - Campaigns
      parameters:
        - name: ids
          in: query
          description: Campaign IDs, maximum 50
          schema:
            type: string
            example: 12345,23456,34567,45678,56789
        - name: statuses
          in: query
          description: |
            Campaign statuses:
            - `-1` — deleted, the deletion process will be completed within 10 minutes
            - `4` — ready to be launched
            - `7` — completed
            - `8` — declined
            - `9` — active
            - `11` — paused
          schema:
            type: string
            example: '-1,4,8'
        - name: payment_type
          in: query
          description: |
            Payment type:
            - `cpm` — cost per mille
            - `cpc` — cost per click
          schema:
            type: string
            enum:
              - cpm
              - cpc
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAdverts'
              example:
                adverts:
                  - bid_type: manual
                    id: 567456457
                    nm_settings:
                      - bids_kopecks:
                          recommendations: 0
                          search: 0
                        nm_id: 123456789
                        subject:
                          id: 52
                          name: кошельки
                      - bids_kopecks:
                          recommendations: 11200
                          search: 11200
                        nm_id: 987654321
                        subject:
                          id: 54
                          name: ювелирные кольца
                    settings:
                      name: Кампания от 01.02.2024
                      payment_type: cpm
                      placements:
                        recommendations: false
                        search: true
                    status: 7
                    timestamps:
                      created: '2024-02-01T09:57:38.500606+03:00'
                      deleted: '2024-02-05T14:29:32.633968+03:00'
                      started: '2024-02-05T12:38:10.212086+03:00'
                      updated: '2024-02-05T14:29:32.633968+03:00'
                  - bid_type: manual
                    id: 28150154
                    nm_settings:
                      - bids_kopecks:
                          recommendations: 0
                          search: 1100
                        nm_id: 5764746785
                        subject:
                          id: 69
                          name: платья
                    settings:
                      name: 'Кампания от 28.08.2025 '
                      payment_type: cpc
                      placements:
                        recommendations: false
                        search: true
                    status: 11
                    timestamps:
                      created: '2025-08-28T09:50:57.611559+03:00'
                      deleted: '2100-01-01T00:00:00+03:00'
                      started: null
                      updated: '2025-09-10T10:14:58.475499+03:00'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response400'
              example:
                detail: invalid payment_type value
                origin: camp-api-public-cache
                request_id: 7e5cb1f106cc6e85b5b29eb2e8815da2
                status: 400
                title: invalid payload
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/advert/v1/bids/min:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      tags:
        - Campaigns Creation
      summary: Minimum Bids for Product Cards
      description: |
        Method allows minimum bids for product cards in kopecks depending on the payment type and placements.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 20 requests | 3 s | 5 requests |
        | Service | 1 min | 20 requests | 3 s | 5 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - advert_id
                - nm_ids
                - payment_type
                - placement_types
              properties:
                advert_id:
                  type: integer
                  format: int64
                  description: Campaign ID
                nm_ids:
                  type: array
                  minLength: 1
                  maxLength: 100
                  items:
                    type: integer
                    format: int64
                  description: WB articles list
                payment_type:
                  type: string
                  enum:
                    - cpm
                    - cpc
                  description: |
                    Payment type:
                      - `cpm` — per mille
                      - `cpc` — per click
                placement_types:
                  description: |
                    Placements:
                      - `search` — search
                      - `recommendation` — recommendation
                      - `combined` — search and recommendation
                  type: array
                  items:
                    type: string
                    enum:
                      - combined
                      - search
                      - recommendation
            example:
              advert_id: 98765432
              nm_ids:
                - 12345678
                - 87654321
              payment_type: cpm
              placement_types:
                - combined
                - search
                - recommendation
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                required:
                  - bids
                properties:
                  bids:
                    type: array
                    description: List of product cards with bids
                    items:
                      type: object
                      required:
                        - nm_id
                        - bids
                      properties:
                        bids:
                          type: array
                          description: List of bids by placements
                          items:
                            type: object
                            required:
                              - type
                              - value
                            properties:
                              type:
                                $ref: '#/components/schemas/PlacementType'
                              value:
                                type: integer
                                description: Minimum bid, kopecks
                        nm_id:
                          type: integer
                          format: int64
                          description: WB article
              example:
                bids:
                  - bids:
                      - type: combined
                        value: 155
                      - type: search
                        value: 250
                      - type: recommendation
                        value: 250
                    nm_id: 12345678
                  - bids:
                      - type: combined
                        value: 155
                      - type: search
                        value: 250
                      - type: recommendation
                        value: 250
                    nm_id: 87654321
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardizedBatchError'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v2/seacat/save-ad:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Create Campaign
      description: |
        The method creates campaign:
          - with custom bid for promotion products in search and/or recommendations
          - with standard bid for promotion products both in search and recommendations

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 5 requests | 12 s | 5 requests |
        </div>
      tags:
        - Campaigns Creation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  description: Campaign name
                  type: string
                nms:
                  type: array
                  description: "Product card for this campaign. You can available product cards with [product cards for campaigns](./promotion#tag/Campaigns-Creation/paths/~1adv~1v2~1supplier~1nms/post) method. Maximum of 50\_products (`nm`)\n"
                  items:
                    type: integer
                    description: WB article (`nmId`)
                bid_type:
                  type: string
                  default: manual
                  enum:
                    - manual
                    - unified
                  description: |
                    Bid type:
                      - `unified` — standard bid
                      - `manual` — custom bid
                payment_type:
                  type: string
                  default: cpm
                  enum:
                    - cpm
                    - cpc
                  description: |
                    Payment type:
                    - `cpm` — cost per mille
                    - `cpc` — cost per click. When creating a campaign with this payment type, a minimum bid is automatically set
                placement_types:
                  type: array
                  default:
                    - search
                  description: |
                    Placements:
                      - `search` — search
                      - `recommendations` — recommendations

                     Specify for campaign with custom bid only
                  items:
                    type: string
                    enum:
                      - search
                      - recommendations
            example:
              name: Телефоны
              nms:
                - 146168367
                - 200425104
              bid_type: manual
              placement_types:
                - search
                - recommendations
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: integer
                description: Campaign ID
                example: 1234567
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: string
              example: Нет доступных категорий для рк. Создайте новую кампанию для попадания в текущие категории
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v1/supplier/subjects:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Subjects for Campaigns
      description: |
        Returns subjects product cards from which are available for all campaigns

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 12 s | 1 request | 12 s | 5 requests |
        | Service | 12 s | 1 request | 12 s | 5 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      parameters:
        - name: payment_type
          in: query
          description: |
            Payment type:
            - `cpm` — cost per mille
            - `cpc` — cost per click
          schema:
            type: string
            default: cpm
          required: false
      tags:
        - Campaigns Creation
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                nullable: true
                x-nullable: true
                items:
                  type: object
                  properties:
                    id:
                      description: Subject ID
                      type: integer
                    name:
                      description: Subject
                      type: string
                    count:
                      description: Number of WB articles (`nmId`) in this subject
                      type: integer
              examples:
                Array:
                  value:
                    - name: 3D очки
                      id: 2560
                      count: 1899
                'null':
                  value: null
        '401':
          $ref: '#/components/responses/401'
        '404':
          description: Not found
        '429':
          $ref: '#/components/responses/429'
  /adv/v2/supplier/nms:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Product Cards for Campaigns
      description: |
        Returns product cards that are available for all campaigns.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 5 requests | 12 s | 5 requests |
        | Service | 1 min | 5 requests | 12 s | 5 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      tags:
        - Campaigns Creation
      requestBody:
        description: ID of subjects to get product cards
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
            example:
              - 123
              - 456
              - 765
              - 321
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                description: Product cards for campaigns
                items:
                  type: object
                  properties:
                    title:
                      type: string
                      description: Product name
                      example: Плед
                    nm:
                      type: integer
                      description: WB article
                      example: 146168367
                    subjectId:
                      type: integer
                      description: Subject ID
                      example: 765
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
              example: Error processing request body
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/delete:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Delete Campaign
      description: |
        The method allows to delete campaigns in the status `4` — ready to launch. <br>

        After deleting, the campaign will be in `-1` status for a while.<br>

        It takes between 3 and 10 minutes to completely delete the campaign.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 5 requests | 200 ms | 5 requests |
        </div>
      tags:
        - Campaigns Management
      parameters:
        - name: id
          in: query
          description: Campaign ID
          schema:
            type: integer
          required: true
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseAdvError1'
              examples:
                ResponseInvalidCampaignID:
                  $ref: '#/components/examples/ResponseInvalidCampaignID'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/rename:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Rename Campaign
      description: |
        The method allows to rename a campaign. <br>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 5 requests | 200 ms | 5 requests |
        | Service | 1 s | 5 requests | 200 ms | 5 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      tags:
        - Campaigns Management
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - advertId
                - name
              properties:
                advertId:
                  type: integer
                  description: ID of the campaign where the name is changing
                name:
                  type: string
                  description: New name (max 100 characters)
            example:
              advertId: 2233344
              name: newname
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            text/plain:
              schema:
                type: string
              examples:
                InvalidRcIdAdv:
                  $ref: '#/components/examples/InvalidRcIdAdv'
                IncorrectName:
                  $ref: '#/components/examples/IncorrectName'
                IncorrectSupplierIdAdv:
                  $ref: '#/components/examples/IncorrectSupplierIdAdv'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Error processing request parameters
          content:
            text/plain:
              schema:
                type: string
              examples:
                RequestBodyProcessErrorAdv:
                  $ref: '#/components/examples/RequestBodyProcessErrorAdv'
                CompanyNameChangeErr:
                  $ref: '#/components/examples/CompanyNameChangeErr'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/start:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Launch Campaign
      description: |
        The method allows to run campaigns that are in statuses `4` — ready to launch or `11` — paused campaign. <br>
        To run a campaign, check its budget. If the budget is insufficient, replenish it.<br>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 5 requests | 200 ms | 5 requests |
        </div>
      tags:
        - Campaigns Management
      parameters:
        - name: id
          in: query
          description: Campaign ID
          schema:
            type: integer
            example: 1234
          required: true
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400Response'
              examples:
                IncorrectId:
                  $ref: '#/components/examples/IncorrectId'
                AdvertNotFound:
                  $ref: '#/components/examples/AdvertNotFound'
                LowBudget:
                  $ref: '#/components/examples/LowBudget'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Status not changed
          content:
            text/plain:
              schema:
                type: string
              examples:
                StatusNoChangeAdv:
                  $ref: '#/components/examples/StatusNoChangeAdv'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/pause:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Pause Campaign
      description: |
        Campaign in status `9` — active — can be paused

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 5 requests | 200 ms | 5 requests |
        </div>
      tags:
        - Campaigns Management
      parameters:
        - name: id
          in: query
          description: Campaign ID
          schema:
            type: integer
            example: 1234
          required: true
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400Response'
              examples:
                IncorrectId:
                  $ref: '#/components/examples/IncorrectId'
                AdvertNotFound:
                  $ref: '#/components/examples/AdvertNotFound'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Status not changed
          content:
            text/plain:
              schema:
                type: string
              examples:
                StatusNoChangeAdv:
                  $ref: '#/components/examples/StatusNoChangeAdv'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/stop:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Stop Campaign
      description: |-
        The method allows to end campaigns in statuses:
        - `4` — ready to launch
        - `9` — active
        - `11` — paused

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 s | 5 requests | 200 ms | 5 requests |
        </div>
      tags:
        - Campaigns Management
      parameters:
        - name: id
          in: query
          description: Campaign ID
          schema:
            type: integer
            example: 1234
          required: true
      responses:
        '200':
          description: Success
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/400Response'
              examples:
                IncorrectId:
                  $ref: '#/components/examples/IncorrectId'
                AdvertNotFound:
                  $ref: '#/components/examples/AdvertNotFound'
        '401':
          $ref: '#/components/responses/401'
        '422':
          description: Status not changed
          content:
            text/plain:
              schema:
                type: string
              examples:
                StatusNoChangeAdv:
                  $ref: '#/components/examples/StatusNoChangeAdv'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/auction/placements:
    servers:
      - url: https://advert-api.wildberries.ru
    put:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Changing Placements in Campaigns with Custom Bid
      description: |
        The method allows you to change placements in campaigns with custom bid and per mille payment model — `cpm`.
        <br><br>
