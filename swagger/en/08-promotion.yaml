                              - placement
                            properties:
                              nm_id:
                                type: integer
                                format: int64
                                description: WB article
                              bid_kopecks:
                                type: integer
                                format: int64
                                description: Bid
                              placement:
                                type: string
                                description: |
                                  Placement:
                                    - `search` — in search
                                    - `recommendations`— in recommendations
              example:
