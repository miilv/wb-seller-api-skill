                            - placement
                          properties:
                            nm_id:
                              type: integer
                              format: int64
                              description: WB article
                            bid_kopecks:
                              type: integer
                              format: int64
                              description: Bid, kopecks
                            placement:
                              type: string
                              enum:
                                - search
                                - recommendations
                                - combined
                              description: |
