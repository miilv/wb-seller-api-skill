      in: query
      description: IDs of the promotions for which information should be returned
      name: promotionIDs
      required: true
      schema:
        type: array
        items:
          type: integer
        example:
          - 1
          - 3
          - 64
        uniqueItems: true
        minItems: 1
        maxItems: 100
    offset:
      in: query
      name: offset
      description: From which element to start outputting data
      schema:
        type: integer
        format: uint
        minimum: 0
        example: 0
    startDateTime:
      in: query
      name: startDateTime
      description: Period start, format `YYYY-MM-DDTHH:MM:SSZ`
      required: true
      schema:
        type: string
        format: date-time
        example: '2023-09-01T00:00:00Z'
    endDateTime:
      in: query
      name: endDateTime
      description: Period end, format `YYYY-MM-DDTHH:MM:SSZ`
      required: true
      schema:
        type: string
        format: date-time
        example: '2024-08-01T23:59:59Z'
    allPromo:
      in: query
      name: allPromo
