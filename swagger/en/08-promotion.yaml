    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      tags:
        - Statistics
      summary: Daily Search Clusters Statistics
      description: |
        Returns statistics (views, clicks, add-to-cart, orders, CTR, CPC, CPM, etc.) by search clusters for the specified period detailed by day.


         You can use this method for campaigns with `cpm` — for displays, and `cpc` — for clicks payment models.
        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 10 requests | 6 s | 20 requests |
        | Service | 1 min | 10 requests | 6 s | 20 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/V1GetNormQueryStatsRequest'
            example:
              from: '2026-01-01'
              to: '2026-01-30'
              items:
                - advertId: 123456789
                  nmId: 987654321
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/V1GetNormQueryStatsResponse'
              example:
                items:
                  - advertId: 123456789
                    dailyStats:
                      - date: '2026-01-27'
                        stat:
                          atbs: 39
                          avgPos: 3.3
                          clicks: 75
                          cpc: 1.44
                          cpm: 562.5
                          ctr: 39.06
                          normQuery: Поисковый кластер 0
                          orders: 9
                          shks: 5
                          spend: 108
                          views: 192
                      - date: '2026-01-27'
                        stat:
                          atbs: 71
                          avgPos: 7.9
                          clicks: 56
                          cpc: 4.38
                          cpm: 1290.95
                          ctr: 29.47
                          normQuery: румяна для лица vivienne sabo
                          orders: 2
                          shks: 44
                          spend: 245.28
                          views: 190
                      - date: '2026-01-27'
                        stat:
                          atbs: 39
                          avgPos: 3.3
                          clicks: 75
                          cpc: 1.44
                          cpm: 562.5
                          ctr: 39.06
                          normQuery: Поисковый кластер 2
                          orders: 9
                          shks: 345345
                          spend: 108
                          views: 192
                    nmId: 987654321
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response400'
              example:
                detail: incorrect request body, please check API documentation
                origin: camp-api-public-cache
                request_id: 33e7d9f3fc221648cdf096bf8e62e482
                status: 400
                title: invalid request body
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
