    post:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Top-up of the Campaign Budget
      description: |
        The method tops up the campaign [budget](/openapi/promotion#tag/Finances/paths/~1adv~1v1~1budget/get).<br>
        To launch the campaign after topping up the budget, use the [Launch campaign](/openapi/promotion#tag/Campaigns-Management/paths/~1adv~1v0~1start/get) method.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 1 request | 1 s | 5 requests |
        | Service | 1 s | 1 request | 1 s | 5 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      tags:
        - Finances
      parameters:
        - name: id
          in: query
          description: Campaign ID
          schema:
            type: integer
            example: 1234567
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sum:
                  description: Budget top-up amount
                  type: integer
                  example: 5000
                cashback_sum:
                  description: |
                    Top-up budget sum paid with promo bonuses.
                    <br>
                    You can top up only a certain percentage of the amount, indicated in the `percent` field of the response from the method for getting [balance](./promotion#tag/Finances/paths/~1adv~1v1~1balance/get).
                    <br>
                    Promo bonuses are only applicable to these top-up sources:
                      - `0` — account
                      - `1` — balance sheet
                  type: integer
                  nullable: true
                  example: 1000
                cashback_percent:
                  description: |
                    The percentage of the top-up amount that can be paid with promo bonuses. You need to specify the value of the `percent` field from the response for the method for getting [balance]
                    <br>
                    If you specified `cashback_sum`, the `cashback_percent` parameter becomes required
                  example: 50
                  type: integer
                  nullable: true
                type:
                  description: |
                    Type of top-up source:
                    - `0` — Account
                    - `1` — Balance
                    - `3` — Bonuses
                  type: integer
                  example: 1
                return:
                  type: boolean
                  description: Response return flag (`true` means updated campaign budget size will be returned in the response, `false` or empty means nothing will be returned).
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ResponseWithReturn'
              examples:
                ResponseWithReturn:
                  $ref: '#/components/examples/ResponseWithReturn'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                DepositAmountMultiple50:
                  description: The top-up amount must be a multiple of 50 roubles
                  value:
                    error: Сумма пополнения должна быть кратна 50 руб
                MinimumDepositAmountIs500:
                  description: Minimum top-up amount is 1000 RUB
                  value:
                    error: Минимальная сумма пополнения 1000 рублей
                IncorrectType:
                  description: Wrong top-up source type for promo bonus payment
                  value:
                    error: 'Invalid Params: cashback can not be used with such type'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
