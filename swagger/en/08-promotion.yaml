    servers:
      - url: https://advert-media-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Media Campaigns Number
      description: |
        Method allows you to get the number of the seller's media campaigns.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 10 requests | 100 ms | 10 requests |
        | Service | 1 s | 10 requests | 100 ms | 10 requests |
        | Base | 1 h | 1 request | 1 h | 1 request |
        </div>
      tags:
        - Media
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  all:
                    description: Total number of media campaigns with all statuses and types
                    type: integer
                  adverts:
                    type: object
                    properties:
                      type:
                        description: |
                          Media campaign type:
                          - `1` — daily basis
                          - `2` — views basis
                        type: integer
                      status:
                        description: |
                          Media campaign status:
                            - `1` — template
                            - `2` — moderation
                            - `3` — rejected (with the possibility to resubmit for moderation)
                            - `4` — ready for launch
                            - `5` — scheduled
                            - `6` — running
                            - `7` — completed
                            - `8` — declined
                            - `9` — paused by seller
                            - `10` — paused due to daily limit
                            - `11` — paused
                        type: integer
                      count:
                        description: Number of media campaigns
                        type: integer
              example:
                all: 6
                adverts:
                  type: 2
                  status: 7
                  count: 2
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
