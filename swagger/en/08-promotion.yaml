          - `true` — yes
          - `false` — no
      schema:
        type: boolean
        example: true
        default: false
      required: true
    promotionID:
      in: query
      name: promotionID
      description: Promotion ID
      schema:
        type: integer
        example: 1
      required: true
    limitNomenclature:
      in: query
      name: limit
      description: Number of requested products
      schema:
        type: integer
        format: uint
        minimum: 1
        maximum: 1000
        example: 10
