            properties:
              orderId:
                type: integer
                example: 123456
                description: Assembly order ID
              isError:
                type: boolean
                description: Are there any errors
                example: false
              errors:
                type: array
                example: []
                description: Error data
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      description: Error code
                      example: 404
                    detail:
                      type: string
                      example: NotFound
                      description: Additional error data
              metaDetails:
                type: array
                description: Metadata and their validation statuses
                items:
                  type: object
                  properties:
                    key:
                      type: string
                      example: sgtin
                      description: Metadata
                    value:
                      type: string
                      nullable: true
                      description: Metadata value
                      example: '123456789012345'
                    decision:
                      type: string
                      example: sgtinIntroduced
                      description: |
                        State:
                        - `imei`
                          - `pending` — Metadata for inspection
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                          - `deadlineExceeded` — Validation passed
                          - `imeiMaySell` — The product is approved for sale. Validation passed
                          - `imeiSoldB2B` — The product was sold to a B2B buyer and allowed to be sold again. Validation passed
                          - `required` — Required metadata is not filled. Validation failed
                          - `imeiInvalidFormat` — Invalid format. Validation failed
                          - `imeiAlreadySold` — The item with this IMEI has already been sold. Validation failed
                        - `uin`
                          - `filled` — Validation passed
                          - `optional` — Metadata is not required
                        - `sgtin`
                          - `pending` — Metadata for inspection
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                          - `deadlineExceeded` — Validation passed
                          - `sgtinIntroduced` — The product is approved for sale. Validation passed
                          - `sgtinSoldB2B` — The product was sold to a B2B buyer and allowed to be sold again. Validation passed
                          - `required` — Required metadata is not filled. Validation failed
                          - `sgtinInvalidFormat` — Invalid format. Validation failed
                          - `sgtinNotFound` — Metadata not found in [Chestny ZNAK](https://chestnyznak.ru/en/). Validation failed
                          - `sgtinEmitted` —  Metadata has been issued. Validation failed
                          - `sgtinApplied` — Putting into circulation not completed. Validation failed
                          - `sgtinWrittenOff` — Written off. Validation failed
                          - `sgtinRetired` — Retired. Validation failed
                          - `sgtinWithdrawn` — Withdrawn. Validation failed
                          - `sgtinDisaggregation` — Disaggregation. Validation failed
                          - `sgtinDisaggregated` — Disaggregated. Validation failed
                          - `sgtinAppliedNotPaid` — Not paid. Validation failed
                        - `gtin`
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                        - `customsDeclaration`
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
    api.OrdersMetaResponse:
      type: object
      properties:
        meta:
          type: array
          description: Assembly orders metadata
          items:
            $ref: '#/components/schemas/api.OrderMetaV2'
    api.OrderMetaV2:
      type: object
      properties:
        error:
          type: string
          description: |
            Error message. <br>
