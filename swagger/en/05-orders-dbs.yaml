          example: ''
        gtin:
          type: string
          description: GTIN
          example: '123456789012345'
        imei:
          type: string
          description: IMEI
          example: '123456789012345'
        orderId:
          type: integer
          description: Assembly order ID
          example: 654321
        sgtin:
          type: array
          description: Labeling code [Chestny ZNAK](https://chestnyznak.ru/en)
          items:
            type: string
            example: '123456789012345'
        uin:
          type: string
          description: UIN
          example: '123456789012345'
        customsDeclaration:
          type: object
          properties:
            value:
              type: string
              example: 10704010/010624/0000302
              nullable: true
          description: Customs declaration number
    api.OrderStatusesV2:
      type: object
      example:
        orders:
          - supplierStatus: confirm
            wbStatus: waiting
            errors: []
            orderId: 123456
          - supplierStatus: ''
            wbStatus: ''
            errors:
              - code: 404
                detail: NotFound
            orderId: 789012
      properties:
        orders:
          type: array
          description: Status data
          items:
            $ref: '#/components/schemas/api.OrderStatusV2'
    api.OrderStatusV2:
      type: object
      properties:
        errors:
          description: Error detail
          items:
            $ref: '#/components/schemas/api.BatchErrorResponse'
          type: array
        orderId:
          type: integer
          description: Assembly order ID
          example: 123456
        supplierStatus:
          type: string
