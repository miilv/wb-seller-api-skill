        One request with a response code of <code>409</code> is counted as 10 requests
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  maxItems: 1000
                  items:
                    type: object
                    properties:
                      customsDeclaration:
                        type: string
                        minLength: 17
                        maxLength: 29
                        description: Customs declaration number
                        example: 10704010/010624/0000302
                      orderId:
                        type: integer
                        description: Assembly order ID
                    required:
                      - customsDeclaration
                      - orderId
