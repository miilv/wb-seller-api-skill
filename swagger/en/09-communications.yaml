          $ref: '#/components/responses/429'
  /api/v1/questions:
    servers:
      - url: https://feedbacks-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: questionsandfeedback
      security:
        - HeaderApiKey: []
      summary: Question List
      description: |
        The method allows you to get a list of questions by the specified parameters with pagination and sorting.<br> It is possible to get a maximum of 10,000 questions per query

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for all methods in the <strong>Feedbacks and Questions</strong> category:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 3 requests | 333 ms | 6 requests |
        | Service | 1 s | 3 requests | 333 ms | 6 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      tags:
        - Questions
      parameters:
        - name: isAnswered
          in: query
          description: |
            The question is answered:
              - `true` — yes
              - `false` — no
          schema:
            type: boolean
          required: true
        - name: nmId
          in: query
          description: WB article
          schema:
            type: integer
        - name: take
          in: query
          description: |
            Number of requested questions (the maximum possible value for the parameter is 10,000, and the total amount of `take` and `skip` parameters must not exceed 10,000)
          schema:
            type: integer
          required: true
        - name: skip
          in: query
          description: |
            Number of questions to skip (maximum possible value for the parameter is 10,000, and the total amount of `take` and `skip` parameters must not exceed 10,000)
          schema:
            type: integer
          required: true
        - name: order
          in: query
          description: Sorting questions by date (`dateAsc`/`dateDesc`)
          schema:
            type: string
        - name: dateFrom
          allowEmptyValue: true
          in: query
          description: The start date of the period in Unix timestamp format
          schema:
            type: integer
            example: 1688465092
        - name: dateTo
          in: query
          description: The end date of the period in Unix timestamp format
          schema:
            type: integer
            example: 1688465092
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      countUnanswered:
                        type: integer
                        description: Number of unanswered questions
                      countArchive:
                        type: integer
                        description: Number of questions answered
                      questions:
                        description: Questions
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: string
                              description: question id
                            text:
                              type: string
                              description: question text
                            createdDate:
                              type: string
                              format: date-time
                              description: Date and time the question was created
                            state:
                              type: string
                              description: |
                                Question status:
                                  - `none` — question rejected by seller (this question doesn't appear on the buyer portal)
                                  - `wbRu` — answer provided, the question is displayed on the buyers site
                                  - `suppliersPortalSynch` - new question
                            answer:
                              description: Answer structure
                              nullable: true
                              type: object
                              properties:
                                text:
                                  type: string
                                  description: Answer text
                                editable:
                                  type: boolean
                                  description: Ability to edit answer (`false` - unable, `true` - able to)
                                createDate:
                                  type: string
                                  format: date-time
                                  description: Date and time the answer was created
                            productDetails:
                              type: object
                              description: Product information
                              properties:
                                nmId:
                                  type: integer
                                  description: WB article
                                imtId:
                                  type: integer
                                  description: Merged product cards ID
                                productName:
                                  type: string
                                  description: Product name
                                supplierArticle:
                                  type: string
                                  description: Seller's article
                                supplierName:
                                  type: string
                                  description: Seller's name
                                brandName:
                                  type: string
                                  description: Brand name
                            wasViewed:
                              type: boolean
                              description: If the question was viewed
                            isWarned:
                              type: boolean
                              description: |
                                Suspicious question indicator.<br>
                                If `true`, the question is published, but on the seller portal, you will see a banner saying **Suspicious message**
                  error:
                    type: boolean
                    description: Error presence
                    example: false
                  errorText:
                    type: string
                    description: Error description
                    example: ''
                  additionalErrors:
                    description: Additional errors
                    nullable: true
                    type: array
                    items:
                      type: string
              example:
                data:
                  countUnanswered: 24
                  countArchive: 508
                  questions:
                    - id: 2ncBtX4B9I0UHoornoqG
                      text: Question text
                      createdDate: '2022-02-01T11:18:08.769513469Z'
                      state: suppliersPortalSynch
                      answer: null
                      productDetails:
                        imtId: 11157265
                        nmId: 14917842
                        productName: Coffee
                        supplierArticle: '123401'
                        supplierName: ' ГП Реклама и услуги'
                        brandName: Nescafe
                      wasViewed: false
                      isWarned: false
                error: false
                errorText: ''
                additionalErrors: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr400:
                  $ref: '#/components/examples/FeedbackErr400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr403:
                  $ref: '#/components/examples/FeedbackErr403'
        '429':
          $ref: '#/components/responses/429'
    patch:
      x-readonly-method: false
      x-category: questionsandfeedback
      security:
        - HeaderApiKey: []
      summary: Working with Questions
      description: |
        Depending on the request body, you can:
        - View question.
        - Reject question.
        - Answer question or edit the answer.

        It is possible to edit a response to a question within 2 months (60 days), after the response has been submitted and only once.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for all methods in the <strong>Feedbacks and Questions</strong> category:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 3 requests | 333 ms | 6 requests |
        | Service | 1 s | 3 requests | 333 ms | 6 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      tags:
        - Questions
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required:
                    - id
                    - wasViewed
                  properties:
                    id:
                      description: Question ID
                      type: string
                      example: n5um6IUBQOOSTxXoo0gV
                    wasViewed:
                      description: If the question was viewed
                      type: boolean
                      example: true
                - type: object
                  required:
                    - id
                    - answer
                    - state
                  properties:
                    id:
                      type: string
                      description: Question ID
                      example: n5um6IUBQOOSTxXoo0gV
                    answer:
                      type: object
                      required:
                        - text
                      properties:
                        text:
                          type: string
                          description: Answer text
                          example: answer text
                    state:
                      type: string
                      description: |
                        - `none` - question rejected by seller (this question doesn't appear on the buyer portal).
                        - `wbRu` - answer provided, the question is displayed on the buyers site.
            examples:
              ViewQuestion:
                description: View question
                value:
                  id: n5um6IUBQOOSTxXoo0gV
                  wasViewed: true
              RejectQuestion:
                description: Reject question
                value:
                  id: n5um6IUBQOOSTxXoo0gV
                  answer:
                    text: текст ответа
                  state: none
              AnswerQuestionOrEditAnswer:
                description: Answer question or edit the answer
                value:
                  id: n5um6IUBQOOSTxXoo0gV
                  answer:
                    text: текст ответа
                  state: wbRu
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                  error:
                    type: boolean
                    description: Error flag
                  errorText:
                    type: string
                    description: Error description
                  additionalErrors:
                    description: Additional errors
                    nullable: true
                    type: array
                    items:
                      type: string
              example:
                data: null
                error: false
                errorText: ''
                additionalErrors: null
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr400:
                  $ref: '#/components/examples/FeedbackErr400'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr403:
                  $ref: '#/components/examples/FeedbackErr403'
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr404:
                  $ref: '#/components/examples/FeedbackErr404'
        '429':
          $ref: '#/components/responses/429'
