  /api/v1/questions/count:
    servers:
      - url: https://feedbacks-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: questionsandfeedback
      security:
        - HeaderApiKey: []
      summary: Number of Questions
      description: |
        The method allows to get the number of questions for requested period

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for all methods in the <strong>Feedbacks and Questions</strong> category:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 3 requests | 333 ms | 6 requests |
        | Service | 1 s | 3 requests | 333 ms | 6 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      tags:
        - Questions
      parameters:
        - name: dateFrom
          in: query
          description: The start date of the period in Unix timestamp format
          schema:
            type: integer
            example: 1688465092
        - name: dateTo
          in: query
          description: The end date of the period in Unix timestamp format
          schema:
            type: integer
            example: 1688465092
        - name: isAnswered
          in: query
          description: |
            If the question was answered:
              - `true` — yes
              - `false` — no
          schema:
            type: boolean
            default: true
            example: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: integer
                    description: Number of questions
                    example: 77
                  error:
                    type: boolean
                    description: Error presence
                    example: false
                  errorText:
                    type: string
                    description: Error description
                    example: ''
                  additionalErrors:
                    description: Additional errors
                    nullable: true
                    type: array
                    items:
                      type: string
                    example: null
