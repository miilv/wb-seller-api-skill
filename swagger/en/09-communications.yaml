      in: query
      name: is_archive
      description: |
        Application status:
          * `false` — under review
          * `true` — in archive
      required: true
      schema:
        type: boolean
        example: true
    id:
      in: query
      name: id
      description: Application ID
      schema:
        type: string
        format: UUID
        example: fe3e9337-e9f9-423c-8930-946a8ebef80
    nm_id:
      in: query
      name: nm_id
      description: WB article
      schema:
        type: integer
        example: 196320101
  securitySchemes:
