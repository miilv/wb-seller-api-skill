              - status: itemNotFound
                title: item not found
                detail: item not found or does not belong to seller
                requestId: 0414dc48df701618e0a3bfc414fe3136
                origin: pin-open-api
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              feedbackId:
                type: string
                description: Feedback ID
              pinId:
                type: integer
                description: Pinning operation ID. If the field is missing, the feedback is not pinned
              pinMethod:
                type: string
                description: |
                  Pinning methods:
                    - `subscription` — Jam subscription
                    - `tariff` — tariff option
                enum:
                  - tariff
                  - subscription
              pinOn:
                type: string
                description: |
                  Feedback pinning placement:
                    - `nm` — product card
                    - `imt` — group of merged product cards
                enum:
                  - nm
                  - imt
              isErrors:
                type: boolean
                description: Are there any errors
              errors:
                type: array
                description: Error detail
                items:
                  $ref: '#/components/schemas/openapi.ResultErr'
                example:
                  - status: itemNotFound
                    title: item not found
                    detail: item not found or does not belong to seller
                    requestId: 0414dс48df701618e0а3bfc414fe3136
                    origin: pin-open-api
            required:
              - feedbackId
              - isErrors
              - pinMethod
              - pinOn
    openapi.PinnedReviewItemResult:
      type: object
      properties:
        changeStateAt:
          type: string
          description: Date and time of pinning or unpinning
          format: date-time
          example: '2020-01-01T15:04:05Z'
        imtId:
          type: integer
          description: Merged product cards ID
          example: 256971531
        nmId:
          type: integer
          description: WB article
          example: 177974151
        pinId:
          type: integer
          description: Pinning feedback operation ID
          example: 1857762
        pinMethod:
          type: string
          description: |
            Pinning methods:
              - `subscription` — Jam subscription
              - `tariff` — tariff option
          example: subscription
          allOf:
            - $ref: '#/components/schemas/domain.ReviewPinMethod'
        pinOn:
          type: string
          description: |
            Feedback pinning placement:
              - `nm` — product card
              - `imt` — group of merged product cards
          example: imt
          allOf:
            - $ref: '#/components/schemas/domain.ReviewPinOn'
        feedbackId:
          type: string
          description: Feedback ID
          example: DibuRAImknLyiqgzvGcU
        state:
          type: string
          description: |
            If the feedback is pinned:
              - `pinned` — yes
              - `unpinned` — no
          example: unpinned
          allOf:
            - $ref: '#/components/schemas/domain.ReviewState'
        unpinnedCause:
          type: string
          description: |
            Reason for unpinning the feedback:
              - `sysTariffUnpinned` — subscription or tariff option is expired
              - `sysLimitReached` — total subscription limit is reached
              - `sysNoratingUnpinned` — feedback is excluded from the rating. For example, it was deleted or banned
              - `sysAdditionalSlot` — the maximum number of feedback is attached to group of merged product cards or to the merged card
          example: sysTariffUnpinned
          enum:
            - sysTariffUnpinned
            - sysLimitReached
            - sysNoratingUnpinned
            - sysAdditionalSlot
      required:
        - changeStateAt
        - feedbackId
        - imtId
        - nmId
        - pinId
        - pinMethod
        - pinOn
        - state
