        '200':
          description: Success
          content:
            application/pdf:
              schema:
                type: string
                format: binary
            image/jpeg:
              schema:
                type: string
                format: binary
            image/png:
              schema:
                type: string
                format: binary
        '202':
          description: The file is under moderation
          content:
            application/json:
              schema:
                type: object
                properties:
                  moderationState:
                    type: string
                    description: Moderation status
                    example: pending
                  retrySeconds:
                    type: integer
                    description: Seconds until retry to request a file
