openapi: 3.0.1
info:
  title: Customer Communication
  version: communication
  description: |
    Management of customer inquiries and feedback, chats, and returns processing
  x-file-name: communications
security:
  - HeaderApiKey: []
tags:
  - name: Questions
    description: ''
  - name: Feedbacks
    description: ''
  - name: Pinned Feedback
    description: ''
  - name: Buyers Chat
    description: ''
  - name: Buyers Returns
    description: ''
paths:
  /api/v1/new-feedbacks-questions:
    servers:
      - url: https://feedbacks-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: questionsandfeedback
      security:
        - HeaderApiKey: []
      summary: Unseen Feedbacks and Questions
      description: |
        The method displays information about the seller's unseen feedbacks and questions

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for all methods in the <strong>Feedbacks and Questions</strong> category:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 s | 3 requests | 333 ms | 6 requests |
        | Service | 1 s | 3 requests | 333 ms | 6 requests |
        | Base | 1 h | 5 requests | 12 min | 1 request |
        </div>
      tags:
        - Questions
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      hasNewQuestions:
                        type: boolean
                        description: |
                          Is there any unviewed questions:
                            - `true` — yes
                            - `false` — no
                        example: true
                      hasNewFeedbacks:
                        type: boolean
                        description: |
                          Is there any unviewed feedbacks:
                            - `true` — yes
                            - `false` — no
                        example: false
                  error:
                    type: boolean
                    description: Error presence
                    example: false
                  errorText:
                    type: string
                    description: Error description
                    example: ''
                  additionalErrors:
                    description: Additional errors
                    nullable: true
                    type: array
                    items:
                      type: string
                    example: null
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          description: Access denied
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responsefeedbackErr'
              examples:
                FeedbackErr403:
                  $ref: '#/components/examples/FeedbackErr403'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/questions/count-unanswered:
