    GetClaimsSuccessResponse:
      description: Success
      content:
        application/json:
          schema:
            type: object
            example:
              claims:
                - id: fe3e9337-e9f9-423c-8930-946a8ebef80
                  claim_type: 1
                  status: 2
                  status_ex: 8
                  nm_id: 196320101
                  user_comment: Длина провода не соответствует описанию
                  wb_comment: Продавец одобрил вашу заявку. Для возврата средств необходимо вернуть товар продавцу. Укажите дату, когда вам удобно принять курьера.
                  dt: '2025-03-26T17:06:12.245611'
                  imt_name: Кабель 0.5 м, 3797
                  order_dt: '2024-10-27T05:18:56'
                  dt_update: '2025-05-10T18:01:06.999613'
                  photos:
                    - //photos.wbstatic.net/claim/fe3e9337-e9f9-423c-8930-946a8ebef80/1.webp
                    - //photos.wbstatic.net/claim/fe3e9337-e9f9-423c-8930-946a8ebef80/2.webp
                  video_paths:
                    - //video.wbstatic.net/claim/fe3e9337-e9f9-423c-8930-946a8ebef80/1.mp4
                  actions:
                    - autorefund1
                    - approve1
                  price: 157
                  currency_code: '643'
                  srid: v5o_7143225816503318733.0.0
                  origin_id_info: IMEI 359889346153011, указанный покупателем в  заявке на возврат, не совпадает с IMEI 359889346238986, указанным продавцом или отсканированным на складе Wildberries
                  delivery_dt: '2025-04-09T14:36:07'
              total: 31
            properties:
              claims:
                type: array
                description: Applications
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      description: Application ID
                      format: UUID
                    claim_type:
                      type: integer
                      description: |
                        Application source:
                          * `1` — buyers portal
                          * `3` — chat
                    status:
                      type: integer
                      description: |
                        Buyer return decision:
                          * `0` — under review
                          * `1` — refusal
                          * `2` — approved
                    status_ex:
                      type: integer
                      description: |
                        Product status:
                          * `0` — application under review
                          * `1` — product stays with buyer (Application rejected)
                          * `2` — buyer returns product to WB, product sent for disposal
                          * `5` — product stays with buyer (Application approved)
                          * `8` — product will be returned to sale after WB inspection
                          * `10` — product returned to seller
                    nm_id:
                      type: integer
                      description: WB article
                    user_comment:
                      type: string
                      maxLength: 1000
                      description: Buyer comment
                    wb_comment:
                      nullable: true
                      type: string
                      maxLength: 10000
                      description: Answer to the buyer in Russian
                    dt:
                      type: string
                      description: Date and time the application was submitted by the buyer. UTC+3
                    imt_name:
                      nullable: true
                      type: string
                      description: Product name
                    order_dt:
                      type: string
                      description: Order date and time
                    dt_update:
                      type: string
                      description: Date and time the application was reviewed. For the application that has not been reviewed — date and time the application was submitted. UTC+3
                    photos:
                      type: array
                      description: Photos from buyer application
                      minItems: 0
                      maxItems: 10
                      items:
                        type: string
                        format: WEBP
                    video_paths:
                      type: array
                      description: Videos from buyer application
                      minItems: 0
                      maxItems: 1
                      items:
                        type: string
                        format: MP4
                    actions:
                      type: array
                      description: |
                        [Seller's answer](./user-communication#tag/Buyers-Returns/paths/~1api~1v1~1claim/patch) options.<br> Rejected applications can be reconsidered. If the array is empty, the application cannot be processed.<br>
                          * `approve1` — approve with defect check.<br>Money will be refunded to the buyer after the product is returned. The product will be checked at the warehouse. If a defect/packing error is confirmed, the product will be sent to the seller. If the defect/packing error is not confirmed, the product will be returned to sale.
                          <br>Not applicable for the <strong>[In-Store Pickup](./in-store-pickup)</strong> model.
                          * `approve2` — approve and return the product.<br> Money will be refunded to the customer after the product is returned. The product will be sent to the seller.
                          <br>Not applicable for the <strong>[In-Store Pickup](./in-store-pickup)</strong> model.
                          * `autorefund1` — approve without product return.<br>The product will remain with the customer. The money for the product will be refunded to the customer without returning the product.
                          * `reject1` — reject with response template: <details><summary><strong>Брак не обнаружен</strong></summary>Пришлось отклонить заявку — подтвердить производственный брак не получилось. Можете отнести товар на независимую экспертизу или в сервисный центр. Если брак подтвердится, создайте новую заявку с такой же причиной, ещё раз опишите проблему и добавьте фото заключения. А если остались вопросы, задайте их в чате: нажмите кнопку «Написать продавцу».</details>
                          * `reject2` — reject with response template: <details><summary><strong>Добавить фото/видео</strong></summary>Пришлось отклонить заявку — нужно чуть больше информации. Создайте новую заявку с такой же причиной возврата, подробно опишите проблему и добавьте фото, на которых хорошо видно: сам товар целиком, брак, бирку или этикетку, упаковку со штрихкодом Wildberries, если она осталась. Желательно добавить видео — это поможет разобраться.</details>
                          * `reject3` — reject with response template: <details><summary><strong>Направить в сервисный центр</strong></summary>Пришлось отклонить заявку — подтвердить производственный брак не получилось. Вы можете отнести товар в сервисный центр: адрес есть на сайте производителя или в гарантийном талоне. Там всё проверят и выдадут заключение. Если производственный брак подтвердится, создайте новую заявку с такой же причиной, ещё раз опишите проблему и добавьте фото заключения.</details>
                          * `rejectcustom` — reject with a comment.<br> The comment is passed in the `comment` parameter.
                          * `approvecc1` — approve the request for returning the product to the seller's store.<br>You can provide a comment (e.g., contact phone number or operating hours of your returns department) in the `comment` parameter. Upon completion of the return, you need to respond to the request with `"action":"confirmreturngoodcc1"` or `"action":"rejectcustom"`.<br>Applicable only for the <strong>[In-Store Pickup](./in-store-pickup)</strong> model.
                          * `confirmreturngoodcc1` — confirm receipt of the product from the buyer.<br>Applicable only for the <strong>[In-Store Pickup](./in-store-pickup)</strong> model.
                      items:
                        type: string
                    price:
                      type: number
                      description: Actual price with all discounts applied. Charged to the buyer
                    currency_code:
                      type: string
                      description: Price currency code
                    srid:
                      type: string
                      description: Unique order ID for which a product claim was created
                    origin_id_info:
                      type: string
                      description: Result of [IMEI](https://seller.wildberries.ru/instructions/ru/ru/material/items-labeling-in-fbs#imei) verification for a return via a Wildberries pickup point.<br>The value indicates whether the IMEI specified by the seller or scanned during acceptance at a Wildberries warehouse matches the IMEI from the buyer's application, which allows for more efficient [return application processing](./user-communication#tag/Buyers-Returns/paths/~1api~1v1~1claim/patch).<br>Applicable only to **Apple** items of the `Smartphones` subject (`"SubjectId":515`) with a price of 40,000 rubles and above, taking into account the seller's discount ([only](./work-with-products#tag/Prices-and-Discounts/paths/~1api~1v2~1upload~1task/post) `price` and `discount` parameters and fields)
                      nullable: true
                    delivery_dt:
                      type: string
                      description: Date and time the buyer received the order
              total:
                type: integer
                description: Number of applications matching the query parameters. Except `limit` and `offset`
