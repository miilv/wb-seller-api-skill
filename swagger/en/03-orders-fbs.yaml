    409SupplyDeliverError:
      type: object
      nullable: false
      properties:
        code:
          type: string
          description: Error code
          nullable: false
        message:
          type: string
          description: Error description
          nullable: false
        data:
          type: object
          description: Additional data for the error
          nullable: true
          properties:
            orders:
              type: array
              description: Assembly orders whose metadata has not passed or has not yet completed validation
              items:
                type: object
                properties:
                  id:
                    type: integer
                    description: Assembly order ID
                  metaDetails:
                    type: array
                    description: Errors info
                    items:
                      type: object
                      properties:
                        key:
                          type: string
                          description: Metadata
                        value:
                          type: string
                          description: Metadata value
                        decision:
                          type: string
                          description: |
                            State:
                            - `imei`
                              - `pending` ã Metadata for inspection
                              - `required` ã Required metadata is not filled
                              - `imeiInvalidFormat` ã Invalid format
                              - `imeiAlreadySold` ã The item with this IMEI has already been sold
                            - `uin`
                              - `required` ã Required metadata is not filled
                              - `pending` ã Metadata for inspection
                              - `uinInvalidFormat` ã Invalid format
                              - `uinBadStatus` ã Invalid batch status
                              - `uinBadProcess` ã Invalid processing stage
                              - `uinBadStatusAndBadProcess` ã Invalid batch status. Invalid processing stage
                              - `uinNotFound` ã Not found in GIIS DMDK [https://minfin.gov.ru/ru/perfomance/jewels/dmdk].
                                When you receive this error, make sure that the UIN:
                                - is specified in the uploaded Delivery Contract Specification. If the specification was uploaded more than 30 minutes ago, [delete UIN](./orders-fbs#tag/FBS-Metadata/paths/~1api~1v3~1orders~1%7BorderId%7D~1meta/delete) from the assembly order and [add it](./orders-fbs#tag/FBS-Metadata/paths/~1api~1v3~1orders~1%7BorderId%7D~1meta~1uin/put) again
                                - is registered in GIIS DMDK
                                - is specified correctly and is read from the tag without errors
                                - is in circulation
                            - `sgtin`
                              - `pending` ã Metadata for inspection
                              - `required` ã Required metadata is not filled
                              - `sgtinInvalidFormat` ã Invalid format
                              - `sgtinNotFound` ã Metadata not found in [Chestny ZNAK](https://chestnyznak.ru/en/)
                              - `sgtinEmitted` ã Metadata has been issued
                              - `sgtinApplied` ã Putting into circulation not completed
                              - `sgtinWrittenOff` ã Written off
                              - `sgtinRetired` ã Retired
                              - `sgtinWithdrawn` ã Withdrawn
                              - `sgtinDisaggregation` ã Disaggregation
                              - `sgtinDisaggregated` ã Disaggregated
                              - `sgtinAppliedNotPaid` ã Not paid
                            - `gtin`
                              - `required` ã Required metadata is not filled
                            - `expiration`
                              - `required` ã Required metadata is not filled
                            - `customsDeclaration`
                              - `required` ã Required metadata is not filled
