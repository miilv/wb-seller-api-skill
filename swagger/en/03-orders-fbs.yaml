    MetaDetails:
      type: array
      description: Assembly order metadata
      items:
        type: object
        properties:
          key:
            type: string
            example: uin
            description: Metadata
          value:
            nullable: true
            type: string
            example: null
            description: Value
          decision:
            type: string
            example: uinMaySell
            description: |
              State:
              - `imei`
                - `pending` ã Metadata for inspection
                - `filled` ã Validation passed
                - `deadlineExceeded` ã Validation passed
                - `optional` ã Metadata is not required. Validation passed
                - `required` ã Required metadata is not filled. Validation failed
                - `imeiInvalidFormat` ã Invalid format. Validation failed
                - `imeiAlreadySold` ã The item with this IMEI has already been sold. Validation failed
              - `uin`
                - `pending` ã Metadata for inspection
                - `filled` ã Validation passed
                - `deadlineExceeded` ã Validation passed
                - `optional` ã Metadata is not required. Validation passed
                - `required` ã Required metadata is not filled. Validation failed
                - `uinInvalidFormat` ã Invalid format. Validation failed
                - `uinBadStatus` ã Invalid batch status. Validation failed
                - `uinBadProcess` ã Invalid processing stage. Validation failed
                - `uinBadStatusAndBadProcess` ã Invalid batch status. Invalid processing stage. Validation failed
                - `uinNotFound` ã Not found in GIIS DMDK. Validation failed.
                  The status may mean that the UIN:
                    - is not specified in the uploaded Delivery Contract Specification
                    - is not registered in GIIS DMDK
                    - is specified incorrectly and is read from the tag with errors
                    - is not in circulation
              - `sgtin`
                - `pending` ã Metadata for inspection
                - `filled` ã Validation passed
                - `deadlineExceeded` ã Validation passed
                - `optional` ã Metadata is not required. Validation passed
                - `required` ã Required metadata is not filled. Validation failed
                - `sgtinInvalidFormat` ã Invalid format. Validation failed
                - `sgtinNotFound` ã Metadata not found in [Chestny ZNAK](https://chestnyznak.ru/en/). Validation failed
                - `sgtinEmitted` ã Metadata has been issued. Validation failed
                - `sgtinApplied` ã Putting into circulation not completed. Validation failed
                - `sgtinWrittenOff` ã Written off. Validation failed
                - `sgtinRetired` ã Retired. Validation failed
                - `sgtinWithdrawn` ã Withdrawn. Validation failed
                - `sgtinDisaggregation` ã Disaggregation. Validation failed
                - `sgtinDisaggregated` ã Disaggregated. Validation failed
                - `sgtinAppliedNotPaid` ã Not paid. Validation failed
              - `gtin`
                - `filled` ã Validation passed
                - `optional` ã Metadata is not required. Validation passed
                - `required` ã Required metadata is not filled. Validation failed
              - `expiration`
