  /api/v3/orders/stickers/cross-border:
    servers:
      - url: https://marketplace-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: marketplace
      security:
        - HeaderApiKey: []
      tags:
        - FBS Assembly Orders
      summary: Get Stickers for Cross-Border Assembly Orders
      description: |
        Returns a list of stickers for Cross-Border assembly orders in PDF.<br><br>

        For each assembly order, the response contains the sticker generation status:
          - `awaitingTrackNumber` ã the sticker is not ready. Waiting for a carrier's track number.
          - `ready` ã the sticker is ready

        <div class="description_important">
          Stickers may be generated with a delay. Repeat the request until you receive the <code>ready</code> status.
        </div>

        Method limitations:
        - You cannot request more than 100 stickers at a time (no more than 100 assembly order IDs in a request).
        - The method returns stickers only for assembly orders that are on assembly or in delivery [status](/openapi/orders-fbs#tag/FBS-Assembly-Orders/paths/~1api~1v3~1orders~1status/post): `confirm`, `complete`.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for <strong>FBS assembly orders, supplies and passes</strong> methods:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 300 requests | 200 ms | 20 requests |

        One request with a response code of <code>409</code> is counted as 10 requests
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  minItems: 1
                  maxItems: 100
                  description: List of assembly order IDs
                  items:
                    type: integer
                    format: int64
                    example: 3869227998
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  stickers:
                    type: array
                    nullable: false
                    items:
                      type: object
                      properties:
                        orderId:
                          type: integer
                          nullable: false
                          description: Assembly order ID
                          example: 3869227998
                        status:
                          type: string
                          nullable: false
                          enum:
                            - awaitingTrackNumber
                            - ready
                          description: |
                            Sticker generation status:
                              - `awaitingTrackNumber` ã the sticker is not ready. Waiting for a carrier's track number.
                              - `ready` ã the sticker is ready
                          example: ready
                        parcelId:
                          type: string
                          description: Assembly order tracking number in the sticker
                          example: WB0000000001
                        file:
                          type: string
                          format: byte
                          nullable: false
                          description: Base64 encoded sticker in a PDF format
                          example: 
                        partA:
                          type: string
                          nullable: false
                          description: The first part of the sticker ID for printing the signature
                          example: '231648'
                        partB:
                          type: string
                          nullable: false
                          description: The second part of the sticker ID for printing the signature
                          example: '9753'
                        barcode:
                          type: string
                          nullable: false
                          description: The encoded value of the sticker
                          example: '!uKEtQZVx'
              example:
                stickers:
                  - orderId: 987654320
                    status: awaitingTrackNumber
                    parcelId: ''
                    file: ''
                    partA: ''
                    partB: ''
                    barcode: ''
                  - orderId: 123456789
                    status: ready
                    parcelId: WB0000000001
                    file: 
                    partA: '231648'
                    partB: '9753'
                    barcode: '!uKEtQZVx'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                IncorrectRequestBody:
                  $ref: '#/components/examples/IncorrectRequestBody'
                IncorrectRequest:
                  $ref: '#/components/examples/IncorrectRequest'
        '401':
          $ref: '#/components/responses/401'
        '402':
