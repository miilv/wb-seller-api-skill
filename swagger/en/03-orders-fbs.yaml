          description: Archived assembly orders
          type: array
          items:
            $ref: '#/components/schemas/v3.ArchiveOrder'
    v3.ArchiveOrder:
      type: object
      description: Archived assembly order
      required:
        - cargoType
        - colorCode
        - createdAt
        - crossBorder
        - crossBorderType
        - id
        - isZeroOrder
        - metaDetails
        - options
        - orderUid
        - priceInfo
        - product
        - rid
        - scanPrice
        - status
        - stickerId
        - supplyId
        - warehouseId
      properties:
        cargoType:
          description: |
            Type of cargo:
              - `mgt` ã small-sized goods
              - `sgt` ã over dimensional cargo (ODC)
              - `kgtPlus` ã dimensional cargo+ (CD+)
          type: string
          example: mgt
        colorCode:
          description: Color code for tinted products
          type: string
          example: RAL 3017
          nullable: true
        createdAt:
          description: Date when the order was created
          type: string
          example: '2022-05-04'
        crossBorder:
          description: Cross-border order information
          type: object
          nullable: true
          properties:
            parcel:
              description: Parcel ID
              type: string
              example: 1Z999AA10123456784
        crossBorderType:
          description: |
            Assembly order type:
              - `local` ã Non-Cross-Border
              - `crossBorder` ã Cross-Border
          type: string
          example: crossBorder
        id:
          description: Assembly order ID
          type: integer
          example: 1234567890
        isZeroOrder:
          description: |
            Indicator of an order for an item with zero inventory:
              - `false` ã the order is made for an item with a non-zero inventory
              - `true` ã the order is made for an item with zero inventory
          type: boolean
          example: false
        metaDetails:
          description: Assembly order metadata
          $ref: '#/components/schemas/MetaDetails'
          type: array
        options:
          description: Order options
          type: object
          properties:
            isB2B:
              description: |
                Indicator of a B2B sale:
                  - `false` ã not B2B sale
                  - `true` ã B2B sale
              type: boolean
              example: false
        orderUid:
          description: Transaction ID for order grouping. Orders in the same buyer's cart will have the same `orderUid`
          type: string
          example: 165918930_629fbc924b984618a44354475ca58675
        priceInfo:
          description: Order price data
          type: object
          required:
            - convertedCurrencyCode
            - convertedPrice
            - currencyCode
            - price
          properties:
            convertedCurrencyCode:
              description: Currency code of the supplier country
              type: integer
              example: 643
            convertedPrice:
              description: The sum charged to the buyer in the currency of the seller's country including all discounts, multiplied by 100
              type: integer
              example: 1020
            currencyCode:
              description: Sale currency code
              type: integer
              example: 643
            price:
              description: The price in the currency of sale including all discounts, except WB Wallet discount, multiplied by 100
              type: integer
              example: 1020
        product:
          description: Item information
          type: object
          required:
            - article
            - chrtId
            - nmId
            - skus
          properties:
            article:
              description: Seller's article
              type: string
              example: wv1702fyjh
            chrtId:
              description: Item size ID in WB systems
              type: integer
              example: 12345678
            nmId:
              description: WB article
              type: integer
              example: 370870300
            skus:
              description: List of SKUs
              items:
                type: string
              type: array
              example:
                - 12345Ejf5
                - 12345Ejf6
                - 12345Ejf7
        rid:
          description: |
            Unique order ID. <br>
            Note: `rid` corresponds to `srid` in the responses of the methods:
              - [Buyers Return Applications](./user-communication#tag/Buyers-Returns/paths/~1api~1v1~1claims/get)
              - [Orders](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1orders/get)
              - [Sales](./reports#tag/Main-Reports/paths/~1api~1v1~1supplier~1sales/get)
              - [Goods Return Report](./reports#tag/Goods-Return-Report)
              - [Details for the Sales Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailedReportId)
              - [Details for the Sales Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1SalesReportsDetailed)
              - [Details for the Acquiring Expenses Reports by Report ID](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailedReportId)
              - [Details for the Acquiring Expenses Reports by Period](./financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailed)
          type: string
          example: f884001e44e511edb8780242ac120002
        scanPrice:
          description: Acceptance price in kopecks
          type: integer
          nullable: true
          example: 5200
        status:
          description: The latest assembly order statuses
          required:
            - supplierStatus
            - wbStatus
          properties:
            supplierStatus:
              description: Assembly order status set by the seller
              example: complete
              type: string
            wbStatus:
              description: Assembly order status set by WB system
              example: sent_to_carrier
              type: string
          type: object
        stickerId:
          description: Sticker ID
          example: 33811984302
          type: integer
        supplyId:
          description: Supply ID
          example: WB-GI-1234588
          type: string
          nullable: true
        warehouseId:
          description: ID of the seller warehouse from which the product was shipped
          example: 55684681
          type: integer
    v3.SupplyOrderIDsAPI:
      type: object
      properties:
        orderIds:
          type: array
          description: Assembly order IDs
          items:
            type: integer
          example:
            - 132334
            - 203984
            - 403543
            - 598349
    PassOffice:
