      tags:
        - FBS Supplies
      summary: Add Shipping Units to the Supply
      description: |
        Adds the required number of shipping units to the supply.
        <br>
        <br>
        You should add shipping units only to supplies shipped to the pickup points.
        You can add shipping units to an open supply only. You can add as many shipping units as there are items in the supply, plus one more shipping unit.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for <strong>FBS assembly orders, supplies and passes</strong> methods:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 300 requests | 200 ms | 20 requests |

        One request with a response code of <code>409</code> is counted as 10 requests
        </div>
      parameters:
        - $ref: '#/components/parameters/Supply'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - amount
              properties:
                amount:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  description: Shipping units amount to add to the supply
                  example: 4
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  trbxIds:
