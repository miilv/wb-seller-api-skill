        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/download/all:
    servers:
      - url: https://documents-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: documents
      security:
        - HeaderApiKey: []
      tags:
        - Documents
      summary: Get Documents
      description: |
        Returns more than one document.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 5 min | 1 request | 5 min | 5 requests |
        </div>
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/requestDownload'
            example:
              params:
                - extension: zip
                  serviceName: redeem-notification-44841941
                - extension: xlsx
                  serviceName: act-income-mp-392460936
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetDocs'
        '400':
          $ref: '#/components/responses/Responses400DownloadAll'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
components:
  parameters:
    LocaleCat:
      name: locale
      in: query
      schema:
        type: string
        example: ru
        default: en
      description: |
        `title` field language:
          - `ru` — Russian
          - `en` — English
          - `zh` — Chinese
    LocaleList:
      name: locale
      in: query
      schema:
        type: string
        example: ru
        default: en
      description: |
        `category` field language:
          - `ru` — Russian
          - `en` — English
          - `zh` — Chinese
  schemas:
    requestDownload:
      type: object
      properties:
        params:
          type: array
          maxItems: 50
          minItems: 1
          items:
            type: object
            properties:
              extension:
                type: string
                description: Document format
              serviceName:
                type: string
                description: Unique document ID
    GetCategories:
      properties:
        data:
          type: object
          properties:
            categories:
              description: Documents categories
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                    example: redeem-notification
                    description: Document category ID from the [request](./financial-reports-and-accounting#tag/Documents/paths/~1api~1v1~1documents~1list/get) parameter `category`
                  title:
                    type: string
                    example: Уведомление о выкупе
                    description: Document category name from the [response](./financial-reports-and-accounting#tag/Documents/paths/~1api~1v1~1documents~1list/get) field `category`
    GetList:
      properties:
        data:
          type: object
          properties:
            documents:
              description: Documents categories
              type: array
              items:
                type: object
                properties:
                  serviceName:
                    type: string
                    example: redeem-notification-44841941
                    description: Unique document ID
                  name:
                    type: string
                    example: redeem-notification
                    description: Document name
                  category:
                    type: string
                    example: Уведомление о выкупе
                    description: '[Document category](./financial-reports-and-accounting#tag/Documents/paths/~1api~1v1~1documents~1categories/get) name from the response field `title`'
                  extensions:
                    type: array
                    items:
                      type: string
                      example: zip
                    description: Document formats
                  creationTime:
                    type: string
                    example: '2023-10-03T00:18:06.879Z'
                    description: Date and time of document creation
                  viewed:
                    type: boolean
                    example: false
                    description: Whether the document has been downloaded from the personal account
    GetDoc:
      properties:
        data:
          type: object
          properties:
            fileName:
              type: string
              example: Notice of redemption 44841941.zip
              description: Document name
            extension:
              type: string
              example: zip
              description: Document format
            document:
              type: string
              example: ...
              description: Document in base64 encoding
    GetDocs:
      properties:
        data:
          type: object
          properties:
            fileName:
              type: string
              example: documents.zip
              description: Document name
            extension:
              type: string
              example: zip
              description: Document format
            document:
              type: string
              example: ...
              description: Document in base64 encoding
    SalesReportListReq:
      type: object
      description: Request parameters
      required:
        - dateFrom
        - dateTo
      properties:
        dateFrom:
          type: string
          description: |
