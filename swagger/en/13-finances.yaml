      x-readonly-method: true
      x-category: documents
      tags:
        - Documents
      security:
        - HeaderApiKey: []
      summary: Documents Categories
      description: |
        Returns documents categories

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 10 s | 1 request | 10 s | 5 requests |
        </div>
      parameters:
        - $ref: '#/components/parameters/LocaleCat'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetCategories'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/documents/list:
    servers:
      - url: https://documents-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: documents
      security:
        - HeaderApiKey: []
      tags:
        - Documents
      summary: Documents List
      description: |
        Returns seller's documents list

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 10 s | 1 request | 10 s | 5 requests |
        </div>
      parameters:
        - $ref: '#/components/parameters/LocaleList'
        - in: query
          name: beginTime
          schema:
            type: string
            format: date
            example: '2024-07-09'
          description: Period start. Only with `endTime`
        - in: query
          name: endTime
          schema:
            type: string
            format: date
            example: '2024-07-15'
          description: Period end. Only with `beginTime`
        - in: query
          name: sort
          schema:
            type: string
            enum:
              - date
              - category
            default: date
            example: category
          description: |
            Sorting:
              - `date` — by the document creation date
              - `category` — by category (only when `locale=ru`)

            Only with `order`
        - in: query
          name: order
          schema:
            type: string
            enum:
              - desc
              - asc
            default: desc
            example: asc
          description: |
            Data order:
              - `desc` — descending
              - `asc` — ascending

            Only with `sort`
        - in: query
          name: category
          schema:
            type: string
            example: redeem-notification
          description: '[Document category](./financial-reports-and-accounting#tag/Documents/paths/~1api~1v1~1documents~1categories/get) ID from the `name` field'
        - in: query
          name: serviceName
          schema:
            type: string
            example: redeem-notification-44841941
          description: Unique document ID
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
            maximum: 50
            example: 10
          description: The maximum number of response rows
        - in: query
          name: offset
          schema:
            type: integer
            default: 0
            example: 90
          description: From which row to start outputting data
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
