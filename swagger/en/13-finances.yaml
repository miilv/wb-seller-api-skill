openapi: 3.0.1
info:
  version: finances
  title: Documents and Accounting
  description: |
    View seller's [documents](/openapi/financial-reports-and-accounting#tag/Documents), [balance](/openapi/financial-reports-and-accounting#tag/Balance) and [financial reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports)
  x-file-name: finances
security:
  - HeaderApiKey: []
tags:
  - name: Balance
    description: ''
  - name: Financial Reports
    description: ''
  - name: Documents
    description: ''
paths:
  /api/v1/account/balance:
    servers:
      - url: https://finance-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: finance
      security:
        - HeaderApiKey: []
      summary: Get Seller's Balance
      description: |
        Balance widget data on [the main page](https://seller.wildberries.ru) of the sellers portal.
        <br><br>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      tags:
        - Balance
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  currency:
                    example: RUB
                    type: string
                    description: Currency
                  current:
                    example: 10196.21
                    type: number
                    description: Current seller's balance
                  for_withdraw:
                    example: 6395.8
                    type: number
                    description: The money that can be withdrawn now
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/finance/v1/sales-reports/list:
    servers:
      - url: https://finance-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: finance
      x-token-types:
        - personal
        - service
      security:
        - HeaderApiKey: []
      tags:
        - Financial Reports
      summary: Sales Report List
      operationId: postV1SalesReportsList
      description: |
        <div class="description_token">Method is available by <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">token types</a>:<strong> Personal</strong>,<strong> Service</strong> </div>

        The method returns sales report list in the [report table](https://seller.wildberries.ru/suppliers-mutual-settlements) format.
        <br><br>
        The list contains data since January 1, 2025.<br>For technical reasons, the method is currently unavailable for your registration country.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReportListReq'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesReportListRes'
        '204':
          description: No data
        '400':
          $ref: '#/components/responses/response400FinancialReports'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/finance/v1/sales-reports/detailed/{reportId}:
    servers:
      - url: https://finance-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: finance
      x-token-types:
        - personal
        - service
      security:
        - HeaderApiKey: []
      tags:
        - Financial Reports
      summary: Details for the Sales Reports by Report ID
      operationId: postV1SalesReportsDetailedReportId
      description: |
        <div class="description_token">Method is available by <a href="/openapi/api-information#tag/Authorization/Rules-for-using-API-access-tokens">token types</a>:<strong> Personal</strong>,<strong> Service</strong> </div>

        The method returns details for the [sales reports](https://seller.wildberries.ru/suppliers-mutual-settlements) by report IDs.
        <br><br>
        The data is available since January 1, 2025.<br>For technical reasons, the method is currently unavailable for your registration country. For now, you can get this data on [request by period](/openapi/financial-reports-and-accounting#tag/Financial-Reports/operation/postV1AcquiringDetailed).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      parameters:
        - name: reportId
          in: path
          description: Report ID.<br>For daily reports, we recommend using non-standard libraries with [BigInt](https://www.npmjs.com/package/json-bigint) support, instead of standard deserialization
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FinancialReportsDetailedReportIdReq'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesReportsDetailedRes'
        '204':
          description: No data
        '400':
          $ref: '#/components/responses/response400FinancialReports'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/finance/v1/sales-reports/detailed:
    servers:
      - url: https://finance-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: finance
      security:
        - HeaderApiKey: []
      tags:
        - Financial Reports
      summary: Details for the Sales Reports by Period
      operationId: postV1SalesReportsDetailed
      description: |
        The method returns details for the [sales reports](https://seller.wildberries.ru/suppliers-mutual-settlements) by specified period.
        <br><br>
        The data is available since January 29, 2024.

        <div class="description_important">
          You can save the report in <a href="https://dev.wildberries.ru/en/cases/1">Google Sheets</a>
        </div>

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SalesReportsDetailedReq'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesReportsDetailedRes'
        '204':
          description: No data
        '400':
          $ref: '#/components/responses/response400FinancialReports'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/v5/supplier/reportDetailByPeriod:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      deprecated: true
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Realization Sales Report
      description: "This method is deprecated. It will be removed on\_[July 15](https://dev.wildberries.ru/en/release-notes?id=498).\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Introduction/Rate-Limits\">Request limit</a> per one seller's account:\n\n\n| Type | Period | Limit | Interval | Burst |\n| --- | --- | --- | --- | --- |\n| Personal | 1 min | 1 request | 1 min | 10 requests |\n| Service | 1 min | 1 request | 1 min | 10 requests |\n| Base | 24 h | 2 requests | 12 h | 1 request |\n</div>\n"
      tags:
        - Financial Reports
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Report start date.<br> Date format: RFC3339. You may send date or date with time. Time could be specified in seconds or milliseconds.<br> The time stands in Moscow time zone (UTC+3). <br>Examples:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
          required: true
          description: Report end date
        - in: query
          name: limit
          schema:
            type: integer
            default: 100000
            maximum: 100000
          required: false
          description: Number of strings in the response
        - in: query
          name: rrdid
          schema:
            type: integer
            default: 0
          required: false
          description: |
            The unique ID of the report line. Required to receive the report in parts.
            <br>
            Report loading must start with `rrdid = 0` and on subsequent API calls, pass the `rrd_id` value in the request from the row line received as a result of the previous call.
            <br>
            Thus, to load a single report, you may need to call the API until a 204 response is returned.
        - in: query
          name: period
          schema:
            type: string
            enum:
              - weekly
              - daily
            default: weekly
          required: false
          description: |
            Report periodicity:
              - `weekly`
              - `daily`
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DetailReportItem'
        '204':
          description: No data
        '400':
          $ref: '#/components/responses/response400FinancialReports'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/finance/v1/acquiring/list:
