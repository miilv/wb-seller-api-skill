components:
  securitySchemes:
    HeaderApiKey:
      type: apiKey
      name: Authorization
      in: header
  parameters:
    Order:
      name: orderId
      in: path
      required: true
      description: Assembly order ID
      schema:
        type: integer
        format: int64
        example: 5632423
    Next:
      name: next
      in: query
      required: true
      schema:
        type: integer
        format: int64
      description: Pagination parameter. Sets the value from which to retrieve the next batch. It should start at `0` to get the full list of data. For the subsequent requests, you must take the value from the `next` field in the response
    Limit:
      name: limit
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 1000
      description: Pagination parameter. Sets the limit for the amount of data returned
  examples:
    IncorrectRequestBody:
      description: Некорректное тело запроса
      value:
        message: ''
    IncorrectRequest:
      value:
        message: ''
    IncorrectRequest1:
      description: Incorrect Request
      value:
        code: IncorrectRequest
        message: ''
    IncorrectParameter:
      value:
        code: IncorrectParameter
        message: ''
    FailedToUpdateMeta:
      value:
        code: FailedToUpdateMeta
        message: ''
    StatusMismatch:
      value:
        data: {}
        code: StatusMismatch
        message: ''
  responses:
    '401':
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details
              code:
                type: string
                description: Internal error code
              requestId:
                type: string
                description: Unique request ID
              origin:
                type: string
                description: WB internal service ID
              status:
                type: number
                description: HTTP status code
              statusText:
                type: string
                description: Text of the HTTP status code
              timestamp:
                type: string
                format: date-time
                description: Request date and time
          example:
            title: unauthorized
            detail: 'token problem; token is malformed: could not base64 decode signature: illegal base64 data at input byte 84'
            code: 07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75
            requestId: 7b80742415072fe8b6b7f7761f1d1211
            origin: s2s-api-auth-catalog
            status: 401
            statusText: Unauthorized
            timestamp: '2024-09-30T06:52:38Z'
    '402':
      description: Payment required
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details. The error is only returned to services from the [Solutions for business Catalog](https://dev.wildberries.ru/business-solutions)
          example:
            title: payment required
            detail: wb solution for business has insufficient funds on its balance. please top up the balance in the company's personal account https://dev.wildberries.ru/company
    '429':
      description: Too many requests
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Error title
              detail:
                type: string
                description: Error details
              code:
                type: string
                description: Internal error code
              requestId:
                type: string
                description: Unique request ID
              origin:
                type: string
                description: WB internal service ID
              status:
                type: number
                description: HTTP status code
              statusText:
                type: string
                description: Text of the HTTP status code
              timestamp:
                type: string
                format: date-time
                description: Request date and time
          example:
            title: too many requests
            detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
            code: 07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]
            requestId: 9d3c02cc698f8b041c661a7c28bed293
            origin: s2s-api-auth-catalog
            status: 429
            statusText: Too Many Requests
            timestamp: '2024-09-30T06:52:38Z'
    NotFound:
      description: The resource is not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NotFound
            message: ''
    AccessDenied:
      description: Access denied
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: AccessDenied
            message: ''
  schemas:
    ClientInfo:
      properties:
        replacementPhone:
          type: string
          description: |
            Replacement phone number to contact the buyer. <br>
            An empty value `""` means that the number is not assigned yet
          example: '79871234567'
          nullable: false
        phone:
          type: string
          description: |
            Buyer contact phone number:
              - if the extension code is not specified in the `phoneCode` field, you can call the buyer using the specified number. Additional phone numbers that do not need extension codes are specified in the `additionalPhones` field
              - if the extension code is specified in the `phoneCode` field, use it to reach the buyer via the specified number and extension code
          example: '+79871234567'
          nullable: false
        firstName:
          type: string
          description: Buyer first name
          example: Иван
          nullable: false
        fullName:
          type: string
          description: Buyer full name, used for documents
          example: Иванов Иван Иванович
          nullable: false
        additionalPhones:
          nullable: false
          type: array
          items:
            type: string
          description: |
            Additional phone numbers to contact the buyer. <br>
            Use it to call the buyer, if the main number from `phone` is unavailable.<br>
            An empty value means that the number is not specified
          example:
            - '1234554321'
        additionalPhoneCodes:
          nullable: false
          type: array
          items:
            type: integer
          description: |
            Additional extension codes. <br>
            Use it if you could not reach the buyer using the extension code from `phoneCode`.<br>
            An empty value means that the codes are not assigned yet
          example:
            - 12345
        orderId:
          type: integer
          description: Assembly order ID
          example: 1345678910
        phoneCode:
          type: integer
          description: |
            Extension phone code. <br>
            Use it to reach the buyer via the number from `phone`.<br>
            If the code is not specified, you can call the buyer without codes
          example: 0
          nullable: false
      type: object
    ClientInfoResp:
      properties:
        orders:
          description: Buyers information
          items:
            $ref: '#/components/schemas/ClientInfo'
          type: array
      type: object
    OrderCourierInfo:
      type: object
      properties:
        courierInfo:
          type: object
          description: Courier info
          allOf:
            - $ref: '#/components/schemas/CourierInfo'
        orderID:
          type: integer
          description: Assembly order ID
          example: 2876979713
    OrderCourierInfoResp:
      type: object
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderCourierInfo'
    CourierContactsResponse:
      type: object
      properties:
        carNumber:
          type: string
          description: Vehicle number
          example: х111хх11
        fullName:
          type: string
          description: Courier's full name
          example: Иванов Иван Иванович
        phone:
          type: string
          description: Phone number
          example: '71230971931'
        pTimeFrom:
          type: string
          format: date-time
          description: Date and time from which the courier will arrive
          nullable: true
          example: '2025-09-06T08:00:00Z'
        pTimeTo:
          type: string
          format: date-time
          description: Date and time by which the courier will arrive
          nullable: true
          example: '2025-09-06T11:00:00Z'
    CourierInfo:
      type: object
      properties:
        contacts:
          type: object
          nullable: true
          description: Courier contact information
          allOf:
            - $ref: '#/components/schemas/CourierContactsResponse'
        mustBeAssigned:
          type: boolean
          description: |
            If the the courier should be assigned by the current moment:
             - `false` — no
             - `true` — yes

             If `"mustBeAssigned": true` and `"contacts": null`, then you need to request the contacts from [support](https://seller.wildberries.ru/service-desk-v2)
        updatedAt:
          type: string
          format: date-time
          description: Date and time of the courier information update. <br> If `null`, the information has not been updated
          nullable: true
          example: '2025-09-06T11:33:10+03:00'
    api.OrdersMetaDetailsResponse:
      type: object
      required:
        - requestId
      properties:
        requestId:
          type: string
          description: Unique request ID
          example: f1787bd2d1fdс35d6f537316514у4a05
        orders:
          type: array
          description: Assembly orders metadata and validation statuses
          items:
            type: object
            required:
              - isError
            properties:
              orderId:
                type: integer
                example: 123456
                description: Assembly order ID
              isError:
                type: boolean
                description: Are there any errors
                example: false
              errors:
                type: array
                example: []
                description: Error data
                items:
                  type: object
                  properties:
                    code:
                      type: integer
                      description: Error code
                      example: 404
                    detail:
                      type: string
                      example: NotFound
                      description: Additional error data
              metaDetails:
                type: array
                description: Metadata and their validation statuses
                items:
                  type: object
                  properties:
                    key:
                      type: string
                      example: sgtin
                      description: Metadata
                    value:
                      type: string
                      nullable: true
                      description: Metadata value
                      example: '123456789012345'
                    decision:
                      type: string
                      example: sgtinIntroduced
                      description: |
                        State:
                        - `imei`
                          - `pending` — Metadata for inspection
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                          - `deadlineExceeded` — Validation passed
                          - `imeiMaySell` — The product is approved for sale. Validation passed
                          - `imeiSoldB2B` — The product was sold to a B2B buyer and allowed to be sold again. Validation passed
                          - `required` — Required metadata is not filled. Validation failed
                          - `imeiInvalidFormat` — Invalid format. Validation failed
                          - `imeiAlreadySold` — The item with this IMEI has already been sold. Validation failed
                        - `uin`
                          - `filled` — Validation passed
                          - `optional` — Metadata is not required
                        - `sgtin`
                          - `pending` — Metadata for inspection
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                          - `deadlineExceeded` — Validation passed
                          - `sgtinIntroduced` — The product is approved for sale. Validation passed
                          - `sgtinSoldB2B` — The product was sold to a B2B buyer and allowed to be sold again. Validation passed
                          - `required` — Required metadata is not filled. Validation failed
                          - `sgtinInvalidFormat` — Invalid format. Validation failed
                          - `sgtinNotFound` — Metadata not found in [Chestny ZNAK](https://chestnyznak.ru/en/). Validation failed
                          - `sgtinEmitted` —  Metadata has been issued. Validation failed
                          - `sgtinApplied` — Putting into circulation not completed. Validation failed
                          - `sgtinWrittenOff` — Written off. Validation failed
                          - `sgtinRetired` — Retired. Validation failed
                          - `sgtinWithdrawn` — Withdrawn. Validation failed
                          - `sgtinDisaggregation` — Disaggregation. Validation failed
                          - `sgtinDisaggregated` — Disaggregated. Validation failed
                          - `sgtinAppliedNotPaid` — Not paid. Validation failed
                        - `gtin`
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
                        - `customsDeclaration`
                          - `optional` — Metadata is not required
                          - `filled` — Validation passed
