          example: 1014
        convertedPrice:
          type: integer
          nullable: false
          description: The price in the currency of the seller's country including all discounts, except WB Wallet discount, multiplied by 100. Provided for informational purposes only
          example: 1014
        currencyCode:
          type: integer
          nullable: false
          format: ISO 4217
          description: Sale currency code
          example: 933
        convertedCurrencyCode:
          type: integer
          nullable: false
          format: ISO 4217
          description: Currency code of the seller country
          example: 643
        cargoType:
          type: integer
          nullable: false
          description: |
            Type of cargo:
              - `1` — small-sized goods
              - `2` — over dimensional cargo (ODC)
              - `3` — dimensional cargo+ (CD+)
          enum:
            - 1
            - 2
            - 3
        isZeroOrder:
          type: boolean
          description: |
            Indicator of an order for a product with zero inventory:
              - `false` — the order is made for a product with a non-zero inventory
              - `true` — the order is made for a product with zero inventory. Such an order can be canceled without a cancellation fee
          example: false
