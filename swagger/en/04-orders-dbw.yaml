  /api/v3/dbw/orders/status:
    servers:
      - url: https://marketplace-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: marketplace
      security:
        - HeaderApiKey: []
      tags:
        - DBW Assembly Orders
      summary: Get Orders Statuses
      description: |
        Returns the statuses of orders based on the provided list of assembly order IDs

        `supplierStatus` is a status of an order. The trigger for its change is the action of the seller himself.<br>
        Possible values for this field are:
        | Status   | Description               | How to move an order to this status   |
        | -------  | ---------                 | --------------------------------------|
        | `new`      | **New order** | |
        | `confirm`  | **Order on assembly**      |  [Transfer to assembly](/openapi/orders-dbw#tag/DBW-Assembly-Orders/paths/~1api~1v3~1dbw~1orders~1%7BorderId%7D~1confirm/patch)
        | `complete`  | **Order on delivery**<br>    | [Transfer to delivery](/openapi/orders-dbw#tag/DBW-Assembly-Orders/paths/~1api~1v3~1dbw~1orders~1%7BorderId%7D~1assemble/patch)
        | `receive`  | **Received by the buyer**<br>       | Changed by the courier
        | `reject`   | **Declined upon receipt**<br>           |  Changed by the courier
        | `cancel`   | **Canceled by the seller**   |  [Cancel the order](/openapi/orders-dbw#tag/DBW-Assembly-Orders/paths/~1api~1v3~1dbw~1orders~1%7BorderId%7D~1cancel/patch)
        | `cancel_missed_call` | **Cancellation due to unreachable buyer** | The status changes automatically |

        `wbStatus` is a status of an order on the Wildberries side.<br>
        Possible values for this field are:
        - `waiting` — order in work
        - `sold` — the buyer got the order
        - `canceled` — order canceled
        - `canceled_by_client` — the buyer canceled the order
        - `declined_by_client` — the buyer canceled the order in the first hour <br> Cancellation is available to the buyer in the first hour from the moment of order, if the order is not transferred to confirm status.
        - `defect` — order canceled due to a defect
        - `canceled_by_missed_call` — cancellation due to unreachable buyer
        - `postponed_delivery` — courier delivery is postponed

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account for DBW methods:
        <ul>
            <li>for getting and updating contact lists</li>
            <li>for getting and deleting metadata</li>
            <li>assembly orders</li>
        </ul>

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 300 requests | 200 ms | 20 requests |

        One request with a response code of <code>409</code> is counted as 10 requests
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - orders
              properties:
                orders:
                  type: array
                  minItems: 1
                  maxItems: 1000
                  description: Orders IDs list
                  items:
                    type: integer
                    format: int64
                    example: 5632423
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders:
                    type: array
                    nullable: false
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          format: int64
                          nullable: false
                          description: Assembly order ID
                          example: 5632423
                        supplierStatus:
                          type: string
                          nullable: false
                          description: Assembly order status set by the seller
                          example: new
                        wbStatus:
                          type: string
                          nullable: false
                          description: Order status in the WB systems
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                IncorrectParameter:
                  $ref: '#/components/examples/IncorrectParameter'
                IncorrectRequestBody:
                  $ref: '#/components/examples/IncorrectRequestBody'
                IncorrectRequest:
                  $ref: '#/components/examples/IncorrectRequest'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '403':
          $ref: '#/components/responses/AccessDenied'
        '429':
          $ref: '#/components/responses/429'
