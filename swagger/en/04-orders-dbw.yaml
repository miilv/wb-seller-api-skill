openapi: 3.0.1
info:
  title: DBW Orders
  version: ordersdbw
  description: |
    Use DBW (Delivery by WB Courier) Orders methods to:
      - get [assembly orders](/openapi/orders-dbw#tag/DBW-Assembly-Orders) information, manage statuses, and cancel assembly orders
      - get, add, edit, and delete [metadata](/openapi/orders-dbw#tag/DBW-Metadata) for assembly orders
  x-file-name: orders-dbw
security:
  - HeaderApiKey: []
tags:
  - name: DBW Assembly Orders
    description: ''
  - name: DBW Metadata
    description: ''
paths:
