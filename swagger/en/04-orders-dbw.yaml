          format: int64
          nullable: false
          description: Assembly order ID
          example: 13833711
        warehouseId:
          type: integer
          nullable: false
          description: Seller's warehouse ID where the order was received
          example: 658434
        nmId:
          type: integer
          nullable: false
          description: WB article
          example: 123456789
        chrtId:
          type: integer
          nullable: false
          description: Product size ID in WB systems
          example: 987654321
        price:
          type: integer
          nullable: false
