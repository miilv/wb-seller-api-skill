openapi: 3.0.1
info:
  title: Reports
  version: reports
  description: Reports on products, retentions, acceptance expenses, and paid storage
  x-file-name: reports
security:
  - HeaderApiKey: []
tags:
  - name: Main Reports
    description: ''
  - name: Warehouses Inventory Report
    description: ''
  - name: Report on Products with Mandatory Labeling
    description: ''
  - name: Retention Reports
    description: ''
  - name: Acceptance Expenses
    description: ''
  - name: Paid Storage
    description: ''
  - name: Sales by Regions
    description: ''
  - name: Share of Brand in Sales
    description: ''
  - name: Hidden Products
    description: ''
  - name: Returns and Product Movement Report
    description: ''
paths:
  /api/v1/supplier/stocks:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Warehouse
      deprecated: true
      description: "This method is deprecated. It will be removed on\_[June 23](https://dev.wildberries.ru/en/release-notes?id=494)\n\n<div class=\"description_limit\">\n<a href=\"/openapi/api-information#tag/Introduction/Rate-Limits\">Request limit</a> per one seller's account:\n\n| Period | Limit | Interval | Burst |\n| --- | --- | --- | --- |\n| 1 min | 1 request | 1 min | 10 requests |\n</div>\n"
      tags:
        - Main Reports
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Date and time of last change on the product.<br>
            The earliest possible value should be entered to get the total leftover, e.g. `2019-06-20`.
            Date format: RFC3339. You may send date or date with time.
            Time could be specified in seconds or milliseconds.<br>
            The time stands in Moscow time zone (UTC+3).
            <br>Examples:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StocksItem'
              example:
                - lastChangeDate: '2023-07-05T11:13:35'
                  warehouseName: Краснодар
                  supplierArticle: '443284'
                  nmId: 1439871458
                  barcode: '2037401340280'
                  quantity: 33
                  inWayToClient: 1
                  inWayFromClient: 0
                  quantityFull: 34
                  category: Посуда и инвентарь
                  subject: Формы для запекания
                  brand: X
                  techSize: '0'
                  Price: 185
                  Discount: 0
                  isSupply: true
                  isRealization: false
                  SCCode: Tech
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/responseErrorStatistics'
                  - $ref: '#/components/schemas/responseErrorStatistics2'
              examples:
                DateFromFieldRequired:
                  $ref: '#/components/examples/DateFromFieldRequired'
                DateFromValueNotValidated:
                  $ref: '#/components/examples/DateFromValueNotValidated'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/supplier/orders:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Orders
      description: |
        The method returns order information.<br>The data updated every 30 minutes.<br><br>

        1 line means 1 order and means 1 item.<br>The `srid` field should be used to identify the order.<br><br>

        Data storage is guaranteed for no more than 90 days from the date of sale.<br><br>

        The responses do not include orders for which payment was not confirmed. For example, it could be orders with delayed payments or installment payments. However, if there are sales for such orders, you can get it using [details for the realization reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports/paths/~1api~1v5~1supplier~1reportDetailByPeriod/get).<br>
        To receive all completed orders, use [Order Feed](https://seller.wildberries.ru/content-analytics/order-feed) in your personal account.

        <div class="description_important">
          The data in this report is preliminary and is used for operational monitoring
        </div>

        For a single response to a request with `flag=0` or without `flag`, a conditional limit of 80,000 rows is set. Therefore, more than one request may be necessary to retrieve all orders. In the second and subsequent requests, use the full value of the `lastChangeDate` field of the last row from the response of the previous request in the `dateFrom` parameter.<br> If the response returns an empty array `[]`, all orders have already been retrieved.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 10 requests |
        </div>
      tags:
        - Main Reports
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Date and time of last change on the order.<br>
            Date format: RFC3339. You may send date or date with time.
            Time could be specified in seconds or milliseconds.<br>
            The time stands in Moscow time zone (UTC+3).
            <br>Examples:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
        - $ref: '#/components/parameters/flag'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrdersItem'
              example:
                - date: '2022-03-04T18:08:31'
                  lastChangeDate: '2022-03-06T10:11:07'
                  warehouseName: Подольск
                  warehouseType: Склад продавца
                  countryName: Россия
                  oblastOkrugName: Центральный федеральный округ
                  regionName: Московская
                  supplierArticle: '12345'
                  nmId: 1234567
                  barcode: '123453559000'
                  category: Бытовая техника
                  subject: Мультистайлеры
                  brand: Тест
                  techSize: '0'
                  incomeID: 56735459
                  isSupply: false
                  isRealization: true
                  totalPrice: 1887
                  discountPercent: 18
                  spp: 26
                  finishedPrice: 1145
                  priceWithDisc: 1547
                  isCancel: true
                  cancelDate: '2022-03-09T00:00:00'
                  sticker: '926912515'
                  gNumber: '34343462218572569531'
                  srid: 11.rf9ef11fce1684117b0nhj96222982382.3.0
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/responseErrorStatistics'
                  - $ref: '#/components/schemas/responseErrorStatistics2'
              examples:
                DateFromFieldRequired:
                  $ref: '#/components/examples/DateFromFieldRequired'
                DateFromValueNotValidated:
                  $ref: '#/components/examples/DateFromValueNotValidated'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/supplier/sales:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Sales
      description: |
        The method returns sale and return information.<br>The data updated every 30 minutes.<br><br>

        1 line means 1 sale/return and means 1 item.<br>The `srid` field should be used to identify the order.<br><br>

        Data storage is guaranteed for no more than 90 days from the date of sale.<br><br>

        <div class="description_important">
          The data in this report is preliminary and is used for operational monitoring
        </div>

          - The responses do not include orders for which payment was not confirmed, even if these orders are in details for the realization reports. For example, it could be orders with delayed payments or installment payments
          - The values of the `priceWithDisc` and `forPay` fields are calculated using a simplified logic and may differ from `retail_price_withdisc_rub` and `ppvz_for_pay`, respectively, in details for the realization reports
          - The fields `finishedPrice`, `priceWithDisc`, and `forPay` may temporarily have the value `0`: data is filled in asynchronously and updated within 24 hours
          - For orders that are paid in a currency other than the seller's currency, prices may be rounded due to currency conversion

        Use [details for the realization reports](/openapi/financial-reports-and-accounting#tag/Financial-Reports/paths/~1api~1v5~1supplier~1reportDetailByPeriod/get) for accurate financial calculations, reconciliation, and reporting.<br><br>

        For a single response to a request with `flag=0` or without `flag`, a conditional limit of 80,000 rows is set. Therefore, more than one request may be necessary to retrieve all sales and returns. In the second and subsequent requests, use the full value of the `lastChangeDate` field of the last row from the response of the previous request in the `dateFrom` parameter.<br> If the response returns an empty array `[]`, all sales and returns have already been retrieved.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      tags:
        - Main Reports
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Date and time of last change on the sale/return.<br>
            Date format: RFC3339. You may send date or date with time.
            Time could be specified in seconds or milliseconds.<br>
            The time stands in Moscow time zone (UTC+3).
            <br>Examples:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
        - $ref: '#/components/parameters/flag'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesItem'
              example:
                - date: '2022-03-04T18:08:31'
                  lastChangeDate: '2022-03-06T10:11:07'
                  warehouseName: Подольск
                  warehouseType: Склад продавца
                  countryName: Россия
                  oblastOkrugName: Центральный федеральный округ
                  regionName: Московская
                  supplierArticle: '12345'
                  nmId: 1234567
                  barcode: '123453559000'
                  category: Бытовая техника
                  subject: Мультистайлеры
                  brand: Тест
                  techSize: '0'
                  incomeID: 56735459
                  isSupply: false
                  isRealization: true
                  totalPrice: 1887
                  discountPercent: 18
                  spp: 20
                  paymentSaleAmount: 93
                  forPay: 1284.01
                  finishedPrice: 1145
                  priceWithDisc: 1547
                  saleID: S9993700024
                  sticker: '926912515'
                  gNumber: '34343462218572569531'
                  srid: 11.rf9ef11fce1684117b0nhj96222982382.3.0
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/responseErrorStatistics'
                  - $ref: '#/components/schemas/responseErrorStatistics2'
              examples:
                DateFromFieldRequired:
                  $ref: '#/components/examples/DateFromFieldRequired'
                DateFromValueNotValidated:
                  $ref: '#/components/examples/DateFromValueNotValidated'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/analytics/excise-report:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: contentanalytics
      tags:
        - Report on Products with Mandatory Labeling
      summary: Report on Products with Mandatory Labeling
      description: |
        Returns operations with labeled products

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 5 h | 10 requests | 30 min | 10 requests |
        | Service | 5 h | 10 requests | 30 min | 10 requests |
        | Base | 24 h | 2 requests | 12 h | 1 request |
        </div>
      parameters:
        - $ref: '#/components/parameters/DateFrom'
        - $ref: '#/components/parameters/DateTo'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExciseReportRequest'
        required: false
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExciseReportResponse'
        '400':
          description: Bad request
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: 'request body has an error: doesn''t match schema #/components/schemas/ExciseReportRequest: Error at "/countries/0": value is not one of the allowed values ["AM","BY","KG","KZ","RU","UZ"]'
                origin: tariffs
                requestId: 8bbd7db59522d09926dd059892dbeff0
                title: Bad Request
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/warehouse_remains:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: contentanalytics
      security:
        - HeaderApiKey: []
      tags:
        - Warehouses Inventory Report
      summary: Create the Report
      description: |
        Creates a task for report generation. The parameters `groupBy` and `filter` can be set in any combination — similar to the [version](https://seller.wildberries.ru/analytics-reports/warehouse-remains) in the personal account.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 1 request | 1 min | 5 requests |
        | Service | 1 min | 1 request | 1 min | 5 requests |
        | Base | 1 h | 4 requests | 15 min | 1 request |
        </div>
      parameters:
        - in: query
          name: locale
          schema:
            type: string
            example: ru
            default: ru
          description: |
            Language of the `subjectName` and `warehouseName` response fields:
              - `ru` — Russian
              - `en` — English
              - `zh` — Chinese. Values of the `warehouseName` are in English
        - name: groupByBrand
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by brand
        - name: groupBySubject
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by subject
        - name: groupBySa
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by seller's article
        - name: groupByNm
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by WB article. If `groupByNm=true`, there will be `volume` field in the response
        - name: groupByBarcode
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by barcode
        - name: groupBySize
          in: query
          schema:
            type: boolean
            example: true
            default: false
          description: Group by size
        - name: filterPics
          in: query
          schema:
            type: integer
            example: 1
            default: 0
          description: |
            Photo filter:
              - `-1` — without photo
              - `0` — do not apply filter
              - `1` — with photo
        - name: filterVolume
          in: query
          schema:
            type: integer
            example: 3
            default: 0
          description: |
            Volume filter:
              - `-1` — without dimensions
              - `0` — do not apply filter
              - `3` — over three liters
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTaskResponse'
              examples:
                CreateResponseData:
                  $ref: '#/components/examples/CreateResponseData'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: 'parameter "groupByNm" in query has an error: empty value is not allowed'
                origin: api-statistics
                requestId: 6a6c2fba81f08e58670a7dab835ff0d7
                title: Bad Request
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
  /api/v1/warehouse_remains/tasks/{task_id}/status:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: contentanalytics
      security:
        - HeaderApiKey: []
      tags:
        - Warehouses Inventory Report
      summary: Check the Status
      description: |
        Returns the status of the generation task

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 5 s | 1 request | 5 s | 5 requests |
        | Service | 5 s | 1 request | 5 s | 5 requests |
        | Base | 1 h | 4 requests | 15 min | 1 request |
        </div>
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            example: 06e06887-9d9f-491f-b16a-bb1766fcb8d2
          description: |
            Generation task ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetTasksResponse'
              examples:
                GetTasksResponseData:
                  $ref: '#/components/examples/GetTasksResponseData'
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: 'Invalid format for parameter task_id: error unmarshaling ''2f071556-ae39-492f-fd8cf1eb0d25'' text as *uuid.UUID: invalid UUID length: 31'
                origin: api-statistics
                requestId: 52dd27a91a1a643feae7201b206462df
                title: Bad Request
        '401':
          $ref: '#/components/responses/401'
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: not found
                origin: api-statistics
                requestId: c777731fc180f215a49c9896c2f1200d
                title: Not Found
        '429':
          $ref: '#/components/responses/429'
  /api/v1/warehouse_remains/tasks/{task_id}/download:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: contentanalytics
      security:
        - HeaderApiKey: []
      tags:
        - Warehouses Inventory Report
      summary: Get the Report
      description: |
        Returns the report by task ID

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:


        | Type | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 1 request | 1 min | 1 request |
        | Service | 1 min | 1 request | 1 min | 1 request |
        | Base | 1 h | 4 requests | 15 min | 1 request |
        </div>
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            example: 06e06887-9d9f-491f-b16a-bb1766fcb8d2
          description: |
            Generation task ID
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    brand:
                      type: string
                      example: Wonderful
                      description: Brand
                    subjectName:
                      type: string
                      example: Фотоальбомы
                      description: Subject name
                    vendorCode:
                      type: string
                      example: 41058/прозрачный
                      description: Seller's article
                    nmId:
                      type: integer
                      example: 183804172
                      description: WB article
                    barcode:
                      type: string
                      example: '2037031652319'
                      description: Barcode
                    techSize:
                      type: string
                      example: '0'
                      description: Size
                    volume:
                      type: number
                      example: 1.33
                      description: Volume, L
                    warehouses:
                      type: array
                      description: Inventory and to and from the client. It will be included in the response only if `quantity` is non-zero
                      items:
                        type: object
                        properties:
                          warehouseName:
                            type: string
                            example: Невинномысск
                            description: Warehouse name
                          quantity:
                            type: integer
                            example: 134
                            description: |
                              Quantity
              example:
                - brand: Wonderful
                  subjectName: Фотоальбомы
                  vendorCode: 41058/прозрачный
                  nmId: 183804172
                  barcode: '2037031652319'
                  techSize: '0'
                  volume: 1.33
                  warehouses:
                    - warehouseName: В пути до получателей
                      quantity: 14
                    - warehouseName: В пути возвраты на склад WB
                      quantity: 4
                    - warehouseName: Всего находится на складах
                      quantity: 267
                    - warehouseName: Невинномысск
                      quantity: 134
                    - warehouseName: Коледино
                      quantity: 133
        '204':
          description: No data
        '400':
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: 'Invalid format for parameter task_id: error unmarshaling ''7b8875---9f03-46f1-af21-b9b4b22fe821'' text as *uuid.UUID: invalid UUID format'
                origin: api-statistics
                requestId: 44bac63ab29c46cb2d49392e6604c1a0
                title: Bad Request
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '404':
          description: Not found
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/4xxResponse'
              example:
                detail: not found
                origin: api-statistics
                requestId: c777731fc180f215a49c9896c2f1200d
                title: Not Found
        '429':
          $ref: '#/components/responses/429'
  /api/analytics/v1/measurement-penalties:
    servers:
      - url: https://seller-analytics-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: contentanalytics
      security:
        - HeaderApiKey: []
      tags:
        - Retention Reports
      summary: Logistics and Storage Costs Multiplier
      operationId: getMeasurementPenalties
      description: |
        The method returns a report with [logistics and storage costs multiplier](https://seller.wildberries.ru/analytics-reports/dimensions-penalties)

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Introduction/Rate-Limits">Request limit</a> per one seller's account:

        | Period | Limit | Interval | Burst |
        | --- | --- | --- | --- |
        | 1 min | 1 request | 1 min | 1 request |
        </div>
      parameters:
        - in: query
          name: dateFrom
          description: Report period start. By default the date when data for the report was first received is used
          schema:
            type: string
            format: date-time
          example: '2025-02-01T15:00:00Z'
        - in: query
          name: dateTo
          required: true
          description: Report period end
          schema:
            type: string
            format: date-time
          example: '2025-10-11T18:00:00Z'
        - name: limit
          in: query
          required: true
          schema:
            type: integer
            example: 330
            maximum: 1000
          description: Number of retentions in the response
        - name: offset
          in: query
          schema:
            type: integer
            example: 220
            default: 0
          description: How many results to skip. For example, with value `10`, the response will start with the 11 element
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeasurementPenalties'
