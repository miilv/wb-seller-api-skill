                          type: string
                          example: Цвет
                          description: The reason for the return
                        returnType:
                          type: string
                          example: Возврат заблокированного товара
                          description: Return type
                        shkId:
                          type: integer
                          example: 23411783472
                          description: Barcode of the product unit
                        srid:
                          type: string
                          example: ad3817664d3046c5a8d55054d8be96d6
                          description: The unique ID of the return order
                        status:
                          type: string
                          example: В пути в пвз
                          description: Return status
                        stickerId:
                          type: string
                          example: '33811984302'
                          description: Sticker of the return order
                        subjectName:
                          type: string
                          example: Багажные бирки
                          description: Subject name
                        techSize:
                          type: string
                          example: '0'
