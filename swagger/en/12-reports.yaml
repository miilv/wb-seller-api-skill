                        dstOfficeId:
                          type: integer
                          example: 310105
                          description: ID of POP where the seller receives returns
                        expiredDt:
                          type: string
                          nullable: true
                          example: '2025-03-31T11:33:53'
                          description: Expiration date and time of the storage period
                        isStatusActive:
                          type: integer
                          example: 0
                          description: |
                            Type of return status:

                              * `0` — archive
                              * `1` — active
                          enum:
                            - 0
                            - 1
                        nmId:
                          type: integer
                          example: 12862181
                          description: WB article
                        orderDt:
                          type: string
                          format: date
                          example: '2024-08-26'
                          description: Date of the return order
                        orderId:
