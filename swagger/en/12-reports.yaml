  parameters:
    flag:
      in: query
      name: flag
      schema:
        type: integer
        default: 0
      required: false
      description: |
        If parameter `flag=0` (or it doesn't exist in requests string), then call of API methods returns data,
        which value of field `lastChangeDate` (date and time of refreshing info of service) is greater or equal to the given
        parameter value  `dateFrom`.
        In this case the number of returned rows of data varies from 0 to approximately 80,000.
        <br>
        If parameter `flag=1`, then information about all orders or sales with the date will be uploaded,
        that equals to the passed parameter `dateFrom` (in this case the time in the date doesn't matter).
        Also the number of returned rows of data will be equal to the number of all orders or sales
        that were made on the specified date, passed in the `dateFrom` parameter.
    Date:
      in: query
      name: date
      description: |
        Date from report period, `YYYY-MM-DD`, for example `2023-12-01`. To get all data from August 2023 do not use this parameter
      schema:
        type: string
      example: '2023-12-01'
    DateFrom:
      in: query
      name: dateFrom
      description: Report period start, `YYYY-MM-DD`
      schema:
        type: string
      example: '2025-02-28'
      required: true
    DateTo:
      in: query
      name: dateTo
      description: Report period end, `YYYY-MM-DD`
      schema:
        type: string
      example: '2025-03-21'
      required: true
    DateFromGoodsLabeling:
      in: query
      name: dateFrom
      description: |
        Report period start, `YYYY-MM-DD`
      schema:
        type: string
        format: date
        example: '2024-04-01'
      required: true
    DateToGoodsLabeling:
      in: query
      name: dateTo
      description: |
        Report period end, `YYYY-MM-DD`
      schema:
        type: string
        format: date
        example: '2024-04-30'
      required: true
