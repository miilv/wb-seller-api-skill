        | --- | --- | --- | --- | --- |
        | Personal | 1 min | 1 request | 1 min | 10 requests |
        | Service | 1 min | 1 request | 1 min | 10 requests |
        | Base | 1 h | 2 requests | 30 min | 1 request |
        </div>
      parameters:
        - name: dateFrom
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2024-08-13'
          description: Beginning date of the reporting period
        - name: dateTo
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2024-08-27'
          description: End date of the reporting period
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  report:
                    description: Report
                    type: array
                    items:
                      type: object
                      properties:
                        barcode:
                          type: string
                          example: '1680063403480'
                          description: Barcode
                        brand:
                          type: string
                          example: dub
                          description: Brand
